                const val = String(cell.v || '');

                // Safely get the value of Column A as a string to prevent type errors
                const colAValue = String(ws['A' + (addr.r + 1)]?.v || '');

                // Row-based conditions
                const isSubtotal = (docKey === 'da375' && tableStartRow !== -1 && colAValue === 'Cộng');
                const isGroup = (docKey === 'da375' && tableStartRow !== -1 && colAValue.startsWith('Xe '));
                const isTotal = (docKey === 'da375' && tableStartRow !== -1 && colAValue === 'TỔNG CỘNG');

                // DNTT row-wide red condition
                const isDnttRedRow = (docKey === 'dntt' && String(ws['A' + (addr.r + 1)]?.v || '').startsWith('Thanh toán giá trị còn nợ'));

                // DC row-wide red condition
                const isDcRedRow = (docKey === 'dc' && String(ws['A' + (addr.r + 1)]?.v || '').startsWith('IV. Số tiền còn phải thanh toán'));

                // Check if the cell is in a merged paragraph row
                let firstCol = -1;
                let cellVal = '';
                for (let col = 0; col <= lastColIdx; col++) {
                    const cKey = XLSX.utils.encode_cell({ r: addr.r, c: col });
                    const cellObj = ws[cKey];
                    if (cellObj && cellObj.v !== undefined && cellObj.v !== null && String(cellObj.v).trim() !== '') {
                        firstCol = col;
                        cellVal = String(cellObj.v);
                        break;
                    }
                }

                const cleanedVal = cellVal.trim().toLowerCase();
                const isFullWidthRow = firstCol !== -1 && (
                    cleanedVal.startsWith('- căn cứ') ||
                    cleanedVal.startsWith('căn cứ') ||
                    cleanedVal.startsWith('hôm nay') ||
                    cleanedVal.startsWith('vậy, đề nghị') ||
                    cleanedVal.startsWith('bằng chữ') ||
                    cleanedVal.startsWith('số tiền trên đề nghị') ||
                    cleanedVal.startsWith('tên đơn vị:') ||
                    cleanedVal.startsWith('tài khoản số:') ||
                    cleanedVal.startsWith('tại ngân hàng:') ||
                    cleanedVal.startsWith('rất mong') ||
                    cleanedVal.startsWith('xin trân trọng') ||
                    cleanedVal.startsWith('trân trọng cảm ơn') ||
                    cleanedVal.startsWith('ghi chú:') ||
                    cleanedVal.startsWith('- đơn giá') ||
                    cleanedVal.startsWith('- địa điểm') ||
                    cleanedVal.startsWith('- thời gian') ||
                    cleanedVal.startsWith('- rất mong') ||
                    cleanedVal.startsWith('hai bên') ||
                    cleanedVal.startsWith('chi tiết số phát sinh') ||
                    cleanedVal.startsWith('giấy đề nghị') ||
                    cleanedVal.startsWith('biên bản') ||
                    cleanedVal.startsWith('đơn đặt hàng') ||
                    cleanedVal.startsWith('bảng kê') ||
                    cleanedVal.startsWith('tên vật liệu') ||
                    cleanedVal.startsWith('công trình:') ||
                    cleanedVal.startsWith('địa điểm:') ||
                    cleanedVal.startsWith('bên a') ||
                    cleanedVal.startsWith('bên b') ||
                    cleanedVal.startsWith('  - ') ||
                    cleanedVal.startsWith('- ') ||
                    (cleanedVal.startsWith('từ ngày ') && cleanedVal.includes('đến ngày '))
                );

                const isHeaderRow = addr.r <= 1;

                // 1. Font styling
                let isBold = false;
                let isItalic = false;
                let fontSize = 12; // Standard size 12
                let fontColor = 'FF000000';

                if (val.includes('GIẤY ĐỀ NGHỊ THANH TOÁN') ||
                    val.includes('BIÊN BẢN XÁC NHẬN GIÁ TRỊ') ||
                    val.includes('BIÊN BẢN XÁC NHẬN KHỐI LƯỢNG') ||
                    val.includes('ĐƠN ĐẶT HÀNG') ||
                    val.includes('BIÊN BẢN ĐỐI CHIẾU CÔNG NỢ') ||
                    val.includes('BẢNG KÊ CHI TIẾT PHIẾU NHẬP VẬT LIỆU')) {
                    isBold = true;
                    fontSize = 15;
                }

                if (val.includes('Từ ngày') ||
                    val.includes('Bằng chữ') ||
                    val.includes('Hai bên cùng nhau tiến hành đối chiếu') ||
                    val.includes('Hai bên cùng nhau đối chiếu khối lượng') ||
                    val.includes('Hai bên tiến hành đối chiếu và xác nhận công nợ')) {
                    fontColor = 'FFFF0000'; // Red
                }

                if (isDnttRedRow || isDcRedRow) {
                    fontColor = 'FFFF0000'; // Red
                    isBold = true;
                }

                if (val.startsWith('- Căn cứ') ||
                    val.startsWith('Căn cứ') ||
                    val.startsWith('Hôm nay') ||
                    val.startsWith('Biên bản được lập') ||
                    val.startsWith('Vậy, Đề nghị') ||
                    val.includes('(Ký') ||
                    val.includes('Xin trân trọng cảm ơn') ||
                    val.includes('Rất mong được') ||
                    val.includes('Chi tiết số phát sinh')) {
                    isItalic = true;
                }

                if (val.startsWith('CÔNG TY') ||
                    val.startsWith('BÊN A') ||
                    val.startsWith('BÊN B') ||
                    val.startsWith('ĐẠI DIỆN') ||
                    val.startsWith('Tên đơn vị') ||
                    val.startsWith('Tài khoản số') ||
                    val.startsWith('Tại ngân hàng') ||
                    val.startsWith('Số tiền trên đề nghị') ||
                    val.startsWith('I.') ||
                    val.startsWith('II.') ||
                    val.startsWith('III.') ||
                    val.startsWith('IV.') ||
                    val.startsWith('CỘNG HÒA') ||
                    val.startsWith('Độc lập') ||
                    val.startsWith('Độc Lập') ||
                    val.startsWith('TQC') ||
                    isGroup ||
                    isSubtotal ||
                    isTotal) {
                    isBold = true;
                }

                if (addr.r >= 9 && addr.r <= 13) {
                    if (val === 'Đặng Ngọc Phi Long' || val === 'Bùi Thị Kiều Trang' || val === 'Nguyễn Sỹ Dũng' || val === 'Giám đốc' || val === 'Kế toán' || val === 'Chỉ Huy Trưởng') {
                        isBold = true;
                    }
                }

                if (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) {
                    if (addr.r === tableStartRow || (hasTotalRow && addr.r === tableEndRow)) {
                        isBold = true;
                    } else if (docKey !== 'da375' && addr.c === 3) {
                        fontColor = 'FFFF0000'; // Red text for volume cells
                        isBold = true; // Bold for volume cells
                    }

                    // Specifically for kl volume cell
                    if (docKey === 'kl' && addr.r === tableStartRow + 1 && addr.c === 3) {
                        isBold = true;
                    }
                }

                // Specially style company signature headings in Bảng Kê to be Bold and size 13
                if (docKey === 'da375' && addr.r === sigStartRow && (addr.c === 0 || addr.c === 4)) {
                    isBold = true;
                    fontSize = 13;
                }

                cell.s = {
                    font: {
                        name: 'Times New Roman',
                        sz: fontSize,
                        bold: isBold,
                        italic: isItalic,
                        color: { rgb: fontColor }
                    }
                };

                // 2. Borders (Apply thin borders inside table range)
                if (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) {
                    cell.s.border = thinBorder;
                }

                // 3. Background Fills
                let fillColor = null;
                if (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) {
                    if (addr.r === tableStartRow) {
                        fillColor = 'FFF2F2F2'; // Light gray header
                    } else if (addr.r === tableEndRow) {
                        if (docKey === 'da375') {
                            fillColor = 'FFC7D7FD'; // Blue
                        } else {
                            fillColor = null; // White (no fill) for gt, ddh, dc total rows
                        }
                    } else {
                        if (docKey === 'da375') {
                            if (isSubtotal) {
                                fillColor = 'FFE8F0FE'; // Light blue subtotal
                            } else if (isGroup) {
                                fillColor = 'FFF5F5F5'; // Light gray group
                            }
                        }
                    }
                }
                if (fillColor) {
                    cell.s.fill = {
                        patternType: 'solid',
                        fgColor: { rgb: fillColor }
                    };
                }

                // 4. Alignments
                let alignH = 'left';
                if (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) {
                    if (docKey === 'da375') {
                        if (addr.c === 0 || addr.c === 1 || addr.c === 2 || addr.c === 4 || addr.c === 5) {
                            alignH = 'center';
                            //alignH = 'center';
                        } else if (addr.c === 6 || addr.c === 7) {
                            alignH = 'right';
                        } else {
                            alignH = 'left';
                        }
                        if (addr.r > tableStartRow) {
                            if (val === 'Cộng' || val === 'TỔNG CỘNG') {
                                alignH = 'right';
                            }
                        }
                    } else {
                        if (addr.c === 0 || addr.c === 2) {
                            alignH = 'center';
                        } else if (addr.c === 3 || addr.c === 4 || addr.c === 5) {
                            alignH = 'right';
                        } else {
                            alignH = 'left';
                        }
                        if (addr.r > tableStartRow) {
                            if (val === 'Thành tiền' || val === 'Tổng' || val === 'Tổng cộng') {
                                alignH = 'center';
                            }
                        }
                    }
                    if (addr.r === tableStartRow) {
                        alignH = 'center'; // Center all header row cells
                    }
                } else {
                    if (typeof cell.v === 'number') {
                        alignH = 'right';
                    } else {
                        const isCenterText = val.includes('CỘNG HÒA') ||
                            val.includes('Độc lập') ||
                            val.includes('Độc Lập') ||
                            val.includes('GIẤY ĐỀ NGHỊ') ||
                            val.includes('BIÊN BẢN') ||
                            val.includes('ĐƠN ĐẶT HÀNG') ||
                            val.includes('BẢNG KÊ') ||
                            val.includes('TÊN VẬT LIỆU') ||
                            val.includes('ĐẠI DIỆN') ||
                            val.includes('(Ký') ||
                            val.includes('Từ ngày') ||
                            (val.startsWith('CÔNG TY') && val.length < 60) ||
                            val === 'TQC' ||
                            val === 'BÊN MUA' ||
                            val === 'BÊN BÁN';

                        const isDateString = (
                            val.startsWith('Hôm nay') ||
                            val.includes('ngày')
                        ) && (
                                val.includes('tháng') &&
                                val.includes('năm')
                            ) && !val.includes('gồm') && !val.includes('căn cứ');

                        if (isCenterText) {
                            alignH = 'center';
                        } else if (isDateString) {
                            alignH = 'right';
                        }
                    }
                }

                // Center all non-empty signature cells dynamically based on sigStartRow
                if (sigStartRow !== -1 && addr.r >= sigStartRow) {
                    if (docKey === 'dntt') {
                        if (addr.c >= 4) {
                            alignH = 'center';
                        }
                    } else {
                        alignH = 'center';
                    }
                }
                let wrap = (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) || isFullWidthRow || (sigStartRow !== -1 && addr.r >= sigStartRow);


                if (val === 'ĐƠN GIÁ (Gồm VAT)' || val === 'Đơn giá (Đã gồm vat)') {
                    wrap = false;
                }
                cell.s.alignment = { horizontal: alignH, vertical: 'center', wrapText: wrap };

                // 5. Number formatting
                if (typeof cell.v === 'number') {
                    if (docKey === 'da375') {
                        if (addr.c === 5) {
                            cell.z = '#,##0'; // Trips (integer)
                        } else if (addr.c === 6 || addr.c === 7) {
                            cell.z = '#,##0.00'; // Volumes (decimal)
                        }
                    } else {
                        if (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) {
                            if (addr.c === 3) {
                                cell.z = '#,##0.00'; // Volume (decimal)
                            } else if (addr.c === 4 || addr.c === 5) {
                                cell.z = '#,##0'; // Currency (integer)
                            }
                        } else {
                            cell.z = '#,##0'; // Outside table values
                        }
                    }
                }
            }

            // 6. Column Widths
            if (docKey === 'da375') {
                ws['!cols'] = [
                    { wch: 6 },  // A (TT)
                    { wch: 16 }, // B (Số phiếu/ngày)
                    { wch: 14 }, // C (Biển số xe)
                    { wch: 20 }, // D (Tên hàng)
                    { wch: 8 },  // E (ĐVT)
                    { wch: 12 }, // F (Số chuyến)
                    { wch: 16 }, // G (KL/chuyến)
                    { wch: 16 }  // H (T.KL)
                ];
            } else if (docKey === 'gt') {
                ws['!cols'] = [
                    { wch: 8 },  // A (Số TT)
                    { wch: 26 }, // B (Nội dung)
                    { wch: 8 },  // C (Đơn vị)
                    { wch: 14 }, // D (Khối lượng)
                    { wch: 26 }, // E (Đơn giá)
                    { wch: 22 }, // F (Thành tiền)
                    { wch: 10 }  // G (Ghi chú)
                ];
            } else if (docKey === 'kl') {
                ws['!cols'] = [
                    { wch: 8 },  // A (TT)
                    { wch: 26 }, // B (Nội dung)
                    { wch: 8 },  // C (ĐVT)
                    { wch: 16 }, // D (Khối lượng)
                    { wch: 14 }  // E (Ghi chú)
                ];
            } else if (docKey === 'ddh') {
                ws['!cols'] = [
                    { wch: 8 },  // A (TT)
                    { wch: 26 }, // B (Nội dung)
                    { wch: 8 },  // C (ĐVT)
                    { wch: 16 }, // D (Khối lượng)
                    { wch: 26 }, // E (Đơn giá)
                    { wch: 22 }  // F (Thành tiền)
                ];
            } else if (docKey === 'dc') {
                ws['!cols'] = [
                    { wch: 8 },  // A (TT)
                    { wch: 26 }, // B (Nội dung)
                    { wch: 8 },  // C (ĐVT)
                    { wch: 16 }, // D (Khối lượng)
                    { wch: 26 }, // E (Đơn giá)
                    { wch: 22 }  // F (Thành tiền)
                ];
            } else if (docKey === 'dntt') {
                ws['!cols'] = [
                    { wch: 12 }, // A
                    { wch: 12 }, // B
                    { wch: 12 }, // C
                    { wch: 12 }, // D
                    { wch: 12 }, // E
                    { wch: 22 }, // F
                    { wch: 8 }   // G
                ];
            }

            // ── A4 Print Setup ──────────────────────────────────────────
            // paperSize 9 = A4 (ISO 216). fitToPage + fitToWidth:1 scales all
            // columns onto exactly 1 page wide; rows flow naturally onto more pages.
            ws['!pageSetup'] = {
                paperSize:   9,           // A4
                orientation: 'portrait',
                fitToPage:   true,
                fitToWidth:  1,           // Fit all columns onto 1 page wide
                fitToHeight: 0,           // Unlimited pages tall
                scale:       100
            };

            // Margins in inches: left/right 0.7", top/bottom 0.75", header/footer 0.3"
            ws['!margins'] = {
                left:   0.7,
                right:  0.7,
                top:    0.75,
                bottom: 0.75,
                header: 0.3,
                footer: 0.3
            };
        }

        async function saveVehiclePrompt(idx = null) {
            const plateVal = document.getElementById('v-plate').value.trim().toUpperCase();
            if (!plateVal) {
                showToast('Vui lòng nhập biển số xe', 'error');
                return;
            }

            let plates = [];
            if (State.config.bienSoXeList) {
                plates = State.config.bienSoXeList.split(/[\n,]+/).map(s => s.trim().toUpperCase()).filter(Boolean);
            }

            if (idx !== null) {
                // Edit mode
                plates[idx] = plateVal;
            } else {
                // Add mode
                if (plates.includes(plateVal)) {
                    showToast('Biển số xe này đã tồn tại trong danh sách', 'error');
                    return;
                }
                plates.push(plateVal);
            }

            const newList = plates.join('\n');
            const cfg = {
                ...State.config,
                bienSoXeList: newList
            };

            showLoading('Đang lưu...');
            try {
                await DB.saveConfig(cfg);
                State.config = cfg;
                showToast(idx !== null ? 'Đã sửa biển số xe' : 'Đã thêm biển số xe', 'success');
                closeModal();
                renderVehicleListPage();
            } catch (e) {
                showToast('Lỗi: ' + e.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function deleteVehicle(idx) {
            let plates = [];
            if (State.config.bienSoXeList) {
                plates = State.config.bienSoXeList.split(/[\n,]+/).map(s => s.trim().toUpperCase()).filter(Boolean);
            }
            const plateToDelete = plates[idx];

            confirmDialog(`Xóa biển số xe ${plateToDelete} khỏi danh sách?`, async () => {
                plates.splice(idx, 1);
                const newList = plates.join('\n');
                const cfg = {
                    ...State.config,
                    bienSoXeList: newList
                };
                showLoading('Đang xóa...');
                try {
                    await DB.saveConfig(cfg);
                    State.config = cfg;
                    showToast('Đã xóa biển số xe', 'success');
                    renderVehicleListPage();
                } catch (e) {
                    showToast('Lỗi: ' + e.message, 'error');
                } finally {
                    hideLoading();
                }
            });
        }

        async function saveApiUrl() {
            const url = document.getElementById('api-url-input').value.trim();
            if (!url) { showToast('Vui lòng nhập URL', 'error'); return; }
            localStorage.setItem('tqc_api_url', url);
            DB.setUrl(url);
            document.getElementById('api-status').innerHTML = '<span style="color:green;">✅ Đã lưu URL. Đang tải dữ liệu...</span>';
            await loadAllData();
            showToast('Kết nối thành công!', 'success');
        }

        async function initGoogleDB() {
            showLoading('Đang khởi tạo database...');
            try {
                await DB.initDB();
                showToast('Khởi tạo database thành công!', 'success');
                await loadAllData();
            } catch (e) { showToast('Lỗi: ' + e.message, 'error'); }
            finally { hideLoading(); }
        }

        async function saveCompanyInfo() {
            const cfg = {
                ...State.config,
                tenCongTy: document.getElementById('cfg-tenCongTy').value.trim(),
                daiDien: document.getElementById('cfg-daiDien').value.trim(),
                chucVu: document.getElementById('cfg-chucVu').value.trim(),
                diaChi: document.getElementById('cfg-diaChi').value.trim(),
                maSoThue: document.getElementById('cfg-maSoThue').value.trim(),
                soTaiKhoan: document.getElementById('cfg-soTaiKhoan').value.trim(),
                nganHang: document.getElementById('cfg-nganHang').value.trim(),
                keToan: document.getElementById('cfg-keToan').value.trim(),
                thanhPho: document.getElementById('cfg-thanhPho').value.trim(),
            };
            showLoading('Đang lưu...');
            try {
                await DB.saveConfig(cfg);
                State.config = cfg;
                showToast('Đã cập nhật thông tin công ty', 'success');
            } catch (e) { showToast('Lỗi: ' + e.message, 'error'); }
            finally { hideLoading(); }
        }


        function exportBackup() {
            const data = {
                exported: new Date().toISOString(),
                customers: State.customers,
                products: State.products,
                deliveries: State.deliveries,
                config: State.config
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `TQC_backup_${todayISO()}.json`; a.click();
            showToast('Đã xuất backup', 'success');
        }

        // ─── MODAL ────────────────────────────────────────────
        function openModal() {
            document.getElementById('global-modal').classList.add('open');
        }
        function closeModal() {
            document.getElementById('global-modal').classList.remove('open');
        }
        // Close on backdrop click
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('global-modal')?.addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });
        });

    </script>

    <script>
        // Update topbar date
        const d = new Date();
        document.getElementById('topbar-date').textContent =
            d.toLocaleDateString('vi-VN', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
    </script>
    <script>
        // Nhan dien URL Web App duoc truyen tu Google Apps Script server
        window.addEventListener('DOMContentLoaded', () => {
            var webAppUrl = '<?= webAppUrl ?>';
            if (webAppUrl && webAppUrl.indexOf('http') === 0) {
                localStorage.setItem('tqc_api_url', webAppUrl);
                if (typeof DB !== 'undefined' && typeof DB.setUrl === 'function') {
                    DB.setUrl(webAppUrl);
                }
                console.log('Tu dong ket noi Google Apps Script API:', webAppUrl);

                // An nut banner canh bao ket noi
                const banner = document.getElementById('api-banner');
                if (banner) banner.classList.add('hidden');
                document.querySelectorAll('.api-required').forEach(el => el.classList.remove('hidden'));
            }
        });
    </script>
