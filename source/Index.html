<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQC – Hệ thống Quản lý Vật liệu Xây dựng</title>
    <meta name="description"
        content="Hệ thống quản lý bán hàng, vận chuyển đá và xuất giấy tờ cho Công ty TNHH Tư Vấn và Xây Dựng TQC">
    <style>
        /* =====================================================
   TQC MANAGEMENT SYSTEM - MAIN STYLES
   Design: Minimalism + Modern Tech (White + Blue Pastel)
   Font: Be Vietnam Pro
===================================================== */

        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap');

        /* ─── CSS Variables ──────────────────────────────── */
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-pale: #dbeafe;
            --primary-dark: #1d4ed8;
            --accent: #60a5fa;
            --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #dbeafe 100%);
            --sidebar-w: 240px;
            --white: #ffffff;
            --text-dark: #1e3a5f;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --success: #10b981;
            --success-pale: #d1fae5;
            --danger: #ef4444;
            --danger-pale: #fee2e2;
            --warning: #f59e0b;
            --warning-pale: #fef3c7;
            --info: #06b6d4;
            --shadow-sm: 0 1px 3px rgba(30, 58, 95, .07), 0 1px 2px rgba(30, 58, 95, .04);
            --shadow: 0 4px 16px rgba(30, 58, 95, .10);
            --shadow-lg: 0 10px 40px rgba(30, 58, 95, .15);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --transition: all 0.2s cubic-bezier(.4, 0, .2, 1);
        }

        /* ─── Reset & Base ───────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 14px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-dark);
            display: flex;
            overflow-x: hidden;
        }

        /* ─── Scrollbar ──────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 99px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* ─── Sidebar ────────────────────────────────────── */
        #sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--white);
            box-shadow: 4px 0 24px rgba(30, 58, 95, .08);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-logo .logo-badge {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .sidebar-logo .company-name {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .sidebar-logo .company-sub {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 0;
            overflow-y: auto;
        }

        .nav-section-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 20px 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 0;
            transition: var(--transition);
            border-left: 3px solid transparent;
            margin: 1px 0;
            text-decoration: none;
        }

        .nav-item:hover {
            background: var(--primary-pale);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary-pale);
            color: var(--primary);
            font-weight: 600;
            border-left-color: var(--primary);
        }

        .nav-item .nav-icon {
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
            font-size: 0.72rem;
            color: var(--text-light);
        }

        /* ─── Main Content ───────────────────────────────── */
        #main {
            margin-left: var(--sidebar-w);
            flex: 1;
            min-height: 100vh;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* ─── Top Bar ────────────────────────────────────── */
        .topbar {
            background: rgba(255, 255, 255, .8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ─── Page Content ───────────────────────────────── */
        .page {
            display: none;
            padding: 28px 32px;
            animation: fadeIn .2s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .page-subtitle {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ─── Cards ──────────────────────────────────────── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .card-body {
            padding: 20px;
        }

        /* ─── Stats Grid ─────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary);
        }

        .stat-card.green::before {
            background: var(--success);
        }

        .stat-card.orange::before {
            background: var(--warning);
        }

        .stat-card.cyan::before {
            background: var(--info);
        }

        .stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 6px 0 2px;
            line-height: 1;
        }

        .stat-unit {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .stat-icon {
            position: absolute;
            right: 16px;
            top: 16px;
            font-size: 1.6rem;
            opacity: .15;
        }

        /* ─── Buttons ────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            white-space: nowrap;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(37, 99, 235, .3);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--border-light);
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary-pale);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
        }

        .btn-ghost:hover {
            background: var(--border-light);
            color: var(--text-dark);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 0.73rem;
        }

        .btn-lg {
            padding: 11px 22px;
            font-size: 0.9rem;
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ─── Table ──────────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        thead tr {
            background: var(--border-light);
        }

        th {
            text-align: left;
            padding: 10px 14px;
            font-weight: 600;
            font-size: 0.73rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 11px 14px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-dark);
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background: #f8faff;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .td-actions {
            display: flex;
            gap: 4px;
        }

        /* ─── Search & Filter Bar ────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 7px 12px;
            flex: 1;
            min-width: 200px;
            max-width: 300px;
        }

        .search-box input {
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.82rem;
            color: var(--text-dark);
            width: 100%;
        }

        .search-box .search-icon {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* ─── Form & Inputs ──────────────────────────────── */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-label .required {
            color: var(--danger);
            margin-left: 2px;
        }

        .form-control {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.83rem;
            color: var(--text-dark);
            background: var(--white);
            transition: var(--transition);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }

        .form-control::placeholder {
            color: var(--text-light);
        }

        select.form-control {
            cursor: pointer;
        }

        .form-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        /* ─── Modal ──────────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .45);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn .25s cubic-bezier(.34, 1.56, .64, 1);
        }

        .modal-lg {
            max-width: 820px;
        }

        .modal-xl {
            max-width: 1100px;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(.93) translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.3rem;
            padding: 2px;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .modal-body {
            padding: 20px 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* ─── Toast ──────────────────────────────────────── */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius);
            background: var(--text-dark);
            color: white;
            font-size: 0.82rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            min-width: 250px;
            animation: toastIn .3s cubic-bezier(.34, 1.56, .64, 1);
        }

        .toast.success {
            background: #065f46;
            border-left: 3px solid var(--success);
        }

        .toast.error {
            background: #7f1d1d;
            border-left: 3px solid var(--danger);
        }

        .toast.info {
            background: #1e3a5f;
            border-left: 3px solid var(--accent);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ─── Loading ────────────────────────────────────── */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, .75);
            backdrop-filter: blur(2px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        /* ─── Empty State ────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: .4;
        }

        .empty-state h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-dark);
        }

        .empty-state p {
            font-size: 0.8rem;
        }

        /* ─── Badge ──────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 0.68rem;
            font-weight: 600;
        }

        .badge-blue {
            background: var(--primary-pale);
            color: var(--primary);
        }

        .badge-green {
            background: var(--success-pale);
            color: #065f46;
        }

        .badge-red {
            background: var(--danger-pale);
            color: #991b1b;
        }

        .badge-yellow {
            background: var(--warning-pale);
            color: #92400e;
        }

        /* ─── Divider ────────────────────────────────────── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        /* ─── Document Preview ───────────────────────────── */
        .doc-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--border-light);
            padding: 4px;
            border-radius: var(--radius);
        }

        .doc-tab {
            flex: 1;
            text-align: center;
            padding: 8px 6px;
            border-radius: var(--radius-sm);
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .doc-tab.active {
            background: var(--white);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* A4 preview */
        .doc-preview-wrap {
            background: #e2e8f0;
            padding: 16px;
            border-radius: var(--radius);
            overflow-y: auto;
            max-height: 70vh;
        }

        .doc-a4 {
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm 18mm;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .15);
            font-family: 'Times New Roman', Times, serif;
            font-size: 12pt;
            color: #000;
            line-height: 1.5;
        }

        .doc-a4 table,
        .doc-a4 th,
        .doc-a4 td {
            font-family: 'Times New Roman', Times, serif;
        }

        .doc-a4 .doc-company-header {
            text-align: center;
        }

        .doc-a4 .doc-vn-header {
            font-weight: bold;
            font-size: 12pt;
            text-align: center;
        }

        .doc-a4 .doc-vn-sub {
            font-size: 11pt;
            text-align: center;
            text-decoration: underline;
        }

        .doc-a4 .doc-date-right {
            text-align: right;
            font-style: italic;
            margin-top: 4px;
        }

        .doc-a4 .doc-title {
            text-align: center;
            font-weight: bold;
            font-size: 14pt;
            margin: 12px 0 4px;
            text-transform: uppercase;
        }

        .doc-a4 .doc-subtitle {
            text-align: center;
            font-style: italic;
            font-size: 11pt;
            margin-bottom: 16px;
        }

        .doc-a4 .doc-section {
            margin: 8px 0;
        }

        .doc-a4 .doc-bold {
            font-weight: bold;
        }

        .doc-a4 .doc-underline {
            text-decoration: underline;
        }

        .doc-a4 .doc-center {
            text-align: center;
        }

        .doc-a4 table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 11pt;
        }

        .doc-a4 table th,
        .doc-a4 table td {
            border: 1px solid #000;
            padding: 4px 6px;
        }

        .doc-a4 table th {
            background: #f0f0f0;
            font-weight: bold;
            text-align: center;
        }

        .doc-a4 .doc-sig-row {
            display: flex;
            justify-content: space-between;
            margin-top: 32px;
        }

        .doc-a4 .doc-sig {
            text-align: center;
            min-width: 200px;
        }

        .doc-a4 .doc-sig-title {
            font-weight: bold;
        }

        .doc-a4 .doc-sig-space {

    <script>
        // =====================================================
        //  js/utils.js - Utility Functions
        // =====================================================

        // ─── ID Generator ─────────────────────────────────
        function genId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        }

        // ─── Date Helpers ─────────────────────────────────
        function todayISO() {
            return new Date().toISOString().slice(0, 10);
        }
        function formatDate(isoStr) {
            if (!isoStr) return '';
            const d = new Date(isoStr + 'T00:00:00');
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }
        function formatDateLong(isoStr) {
            if (!isoStr) return '';
            const d = new Date(isoStr + 'T00:00:00');
            return `ngày ${d.getDate()} tháng ${d.getMonth() + 1} năm ${d.getFullYear()}`;
        }
        function currentDay(dateStr) { const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date(); return d.getDate(); }
        function currentMonth(dateStr) { const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date(); return d.getMonth() + 1; }
        function currentYear(dateStr) { const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date(); return d.getFullYear(); }

        // ─── Number Formatter ─────────────────────────────
        function fmtNum(n, digits = 2) {
            if (n === undefined || n === null || n === '') return '';
            const v = parseFloat(n) || 0;
            return v.toLocaleString('vi-VN', { minimumFractionDigits: 0, maximumFractionDigits: digits });
        }
        function fmtCurrency(n) {
            const v = parseFloat(n) || 0;
            return v.toLocaleString('vi-VN') + ' đồng';
        }
        function fmtCurrencyShort(n) {
            const v = parseFloat(n) || 0;
            return v.toLocaleString('vi-VN');
        }

        // ─── Vietnamese Number → Words ────────────────────
        function docSoTien(amount) {
            const num = Math.round(parseFloat(amount) || 0);
            if (num === 0) return 'Không đồng';

            const DV = ['', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín'];

            function doc3so(n) {
                if (n === 0) return '';
                const tram = Math.floor(n / 100);
                const chuc = Math.floor((n % 100) / 10);
                const dv = n % 10;
                let s = '';
                if (tram > 0) s += DV[tram] + ' trăm';
                if (chuc === 0 && dv > 0) {
                    s += (tram > 0 ? ' lẻ ' : '') + DV[dv];
                } else if (chuc === 1) {
                    s += ' mười';
                    if (dv === 5) s += ' lăm';
                    else if (dv > 0) s += ' ' + DV[dv];
                } else if (chuc > 1) {
                    s += ' ' + DV[chuc] + ' mươi';
                    if (dv === 1) s += ' mốt';
                    else if (dv === 5) s += ' lăm';
                    else if (dv > 0) s += ' ' + DV[dv];
                }
                return s.trim();
            }

            const ty = Math.floor(num / 1e9);
            const trieu = Math.floor((num % 1e9) / 1e6);
            const nghin = Math.floor((num % 1e6) / 1e3);
            const con = num % 1e3;

            let parts = [];
            if (ty > 0) parts.push(doc3so(ty) + ' tỷ');
            if (trieu > 0) parts.push(doc3so(trieu) + ' triệu');
            if (nghin > 0) parts.push(doc3so(nghin) + ' nghìn');
            if (con > 0) parts.push(doc3so(con));

            let result = parts.join(' ');
            result = result.charAt(0).toUpperCase() + result.slice(1);
            return result + ' đồng';
        }

        // ─── HTML Escape ───────────────────────────────────
        function esc(str) {
            return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ─── Deep clone ───────────────────────────────────
        function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

        // ─── Debounce ─────────────────────────────────────
        function debounce(fn, ms = 300) {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
        }

        // ─── Get current month range ──────────────────────
        function currentMonthRange() {
            const now = new Date();
            const y = now.getFullYear(), m = now.getMonth();
            const from = new Date(y, m, 1).toISOString().slice(0, 10);
            const to = new Date(y, m + 1, 0).toISOString().slice(0, 10);
            return { from, to };
        }

        // ─── Sort deliveries by date ───────────────────────
        function sortByDate(arr) {
            return [...arr].sort((a, b) => (a.ngay > b.ngay ? 1 : -1));
        }

        // ─── Group deliveries by license plate ────────────
        function groupByPlate(deliveries) {
            const groups = {};
            sortByDate(deliveries).forEach(d => {
                if (!groups[d.bienSoXe]) groups[d.bienSoXe] = [];
                groups[d.bienSoXe].push(d);
            });
            return groups;
        }

        // ─── Calculate totals ─────────────────────────────
        function calcTotals(deliveries) {
            let tongChuyến = 0, tongKL = 0;
            deliveries.forEach(d => {
                const scc = parseFloat(d.soChuyenCho) || 1;
                const kl = parseFloat(d.khoiLuong) || 0;
                tongChuyến += scc;
                tongKL += kl * scc;
            });
            return { tongChuyến, tongKL };
        }

        // ─── Toast ────────────────────────────────────────
        function showToast(msg, type = 'info', duration = 3000) {
            const container = document.getElementById('toast-container');
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${esc(msg)}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // ─── Loading ──────────────────────────────────────
        function showLoading(text = 'Đang xử lý...') {
            const el = document.getElementById('loading-overlay');
            el.querySelector('.loading-text').textContent = text;
            el.classList.add('active');

        // ─── Confirm Dialog ───────────────────────────────
        function confirmDialog(msg, onConfirm) {
            if (window.confirm(msg)) onConfirm();
        }

        // ─── Clean Vietnamese Accents ──────────────────────
        function cleanVietnamese(str) {
            if (!str) return '';
            return str.toString()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .replace(/Đ/g, "D")
                .toLowerCase();
        }

        // ─── Initialize Custom Searchable Dropdown ────────
        function makeSearchableDropdown(select) {
            if (!select) return;
            if (select.dataset.searchable) return;
            select.dataset.searchable = "true";

            // Hide the original select
            select.style.display = "none";

            // Create wrapper
            const wrapper = document.createElement("div");
            wrapper.className = "searchable-dropdown";
            select.parentNode.insertBefore(wrapper, select);
            wrapper.appendChild(select); // Move select inside wrapper

            // Create trigger
            const trigger = document.createElement("div");
            trigger.className = "dropdown-trigger";
            const triggerText = document.createElement("span");
            triggerText.className = "selected-text";
            trigger.appendChild(triggerText);
            const triggerArrow = document.createElement("span");
            triggerArrow.className = "dropdown-arrow";
            triggerArrow.textContent = "▼";
            trigger.appendChild(triggerArrow);
            wrapper.appendChild(trigger);

            // Create menu
            const menu = document.createElement("div");
            menu.className = "dropdown-menu hidden";

            // Search input
            const searchInput = document.createElement("input");
            searchInput.type = "text";
            searchInput.className = "dropdown-search-input";
            searchInput.placeholder = "Gõ tìm kiếm (Fuzzy search)...";
            menu.appendChild(searchInput);

            // Options container
            const optionsList = document.createElement("div");
            optionsList.className = "dropdown-options-list";
            menu.appendChild(optionsList);
            wrapper.appendChild(menu);

            // Update trigger text based on selected option
            function updateTriggerText() {
                const selectedOpt = select.options[select.selectedIndex];
                triggerText.textContent = selectedOpt ? selectedOpt.textContent : (select.placeholder || "-- Chọn --");
            }

            // Build option list in custom dropdown
            function buildOptions(filter = "") {
                optionsList.innerHTML = "";

                // Clean the filter for relative search
                const cleanFilter = cleanVietnamese(filter);

                Array.from(select.options).forEach((opt, idx) => {
                    const label = opt.textContent;
                    const cleanLabel = cleanVietnamese(label);

                    // Relative search
                    if (filter && !cleanLabel.includes(cleanFilter)) {
                        return; // skip if not matches
                    }

                    const optDiv = document.createElement("div");
                    optDiv.className = `dropdown-option ${opt.selected ? "selected" : ""}`;
                    optDiv.textContent = label;
                    optDiv.dataset.value = opt.value;
                    optDiv.dataset.index = idx;

                    optDiv.addEventListener("click", () => {
                        select.selectedIndex = idx;
                        updateTriggerText();

                        // Mark as selected in custom list
                        optionsList.querySelectorAll(".dropdown-option").forEach(el => el.classList.remove("selected"));
                        optDiv.classList.add("selected");

                        // Close menu
                        menu.classList.add("hidden");
                        trigger.classList.remove("open");

                        // Trigger change event on original select
                        select.dispatchEvent(new Event("change"));
                    });

                    optionsList.appendChild(optDiv);
                });
            }

            // Trigger open/close
            trigger.addEventListener("click", (e) => {
                e.stopPropagation();
                const isOpen = !menu.classList.contains("hidden");
                // Close other dropdowns first
                document.querySelectorAll(".dropdown-menu").forEach(el => el.classList.add("hidden"));
                document.querySelectorAll(".dropdown-trigger").forEach(el => el.classList.remove("open"));

                if (!isOpen) {
                    menu.classList.remove("hidden");
                    trigger.classList.add("open");
                    searchInput.value = "";
                    buildOptions();
                    searchInput.focus();
                }
            });

            // Filter on typing
            searchInput.addEventListener("input", (e) => {
                buildOptions(e.target.value);
            });

            // Close menu when clicking outside
            document.addEventListener("click", (e) => {
                if (!wrapper.contains(e.target)) {
                    menu.classList.add("hidden");
                    trigger.classList.remove("open");
                }
            });

            updateTriggerText();
        }

    </script>
    <script>
        // =====================================================
        //  js/db.js - Google Sheets Database Layer
        // =====================================================

        const DB = {
            apiUrl: '',

            // ─── Init ────────────────────────────────────────
            setUrl(url) { this.apiUrl = url; },

            async _call(params) {
                // Nếu chạy trực tiếp trên Google Apps Script, dùng google.script.run
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    return new Promise((resolve, reject) => {
                        google.script.run
                            .withSuccessHandler(res => {
                                if (res.success) {
                                    resolve(res.data);
                                } else {
                                    reject(new Error(res.error || 'Lỗi không xác định'));
                                }
                            })
                            .withFailureHandler(err => reject(new Error(err.message || err)))
                            .apiHandler(params);
                    });
                }

                // Ngược lại, chạy bằng fetch (offline/local)
                if (!this.apiUrl) throw new Error('Chưa cấu hình API URL. Vào Cài đặt để nhập URL Google Apps Script.');
                const res = await fetch(this.apiUrl, {
                    method: 'POST',
                    body: JSON.stringify(params),
                    headers: { 'Content-Type': 'text/plain' }
                });
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); } catch (e) { throw new Error('Lỗi phản hồi từ server: ' + text.slice(0, 100)); }

            async getConfig() {
                const rows = await this._call({ action: 'read', sheet: 'CauHinh' });
                const cfg = {};
                rows.forEach(r => { cfg[r.key] = r.value; });
                return cfg;
            },
            async saveConfig(cfg) {
                // Read existing keys then update each
                const rows = await this._call({ action: 'read', sheet: 'CauHinh' });
                const existing = {};
                rows.forEach(r => { existing[r.key] = true; });
                for (const [key, value] of Object.entries(cfg)) {
                    if (existing[key]) {
                        await this._call({ action: 'update', sheet: 'CauHinh', id: key, data: { key, value } });
                    } else {
                        await this._call({ action: 'create', sheet: 'CauHinh', data: { key, value } });
                    }
                }
            },

                        const tKL = scc * kl;
                        subtotalChuyến += scc; subtotalKL += tKL;
                        subtotalKLChuyen += kl;
                        rows += `<tr>
          <td class="text-center">${globalIdx++}</td>
          <td class="text-center">${formatDate(d.ngay)}</td>
          <td class="text-center">${esc(plate)}</td>
          <td>${esc(product.ten || 'Đá cấp phối 375')}</td>
          <td class="text-center">${esc(product.donVi || 'M3')}</td>
          <td class="text-center">${scc}</td>
          <td class="text-right">${fmtNum(kl)}</td>
          <td class="text-right">${fmtNum(tKL)}</td>
        </tr>`;
                    });
                    tongTatCaChuyến += subtotalChuyến; tongTatCaKL += subtotalKL;
                    tongTatCaKLChuyen += subtotalKLChuyen;
                    rows += `<tr style="font-weight:bold;background:#e8f0fe;">
        <td colspan="5" class="text-right">Cộng</td>
        <td class="text-center">${subtotalChuyến}</td>
        <td class="text-right">${fmtNum(subtotalKLChuyen)}</td>
        <td class="text-right">${fmtNum(subtotalKL)}</td>
      </tr>`;
                }

                return `<div class="doc-a4">
      <div style="text-align:left; margin-bottom:16px; font-weight:bold; font-size:11pt; text-transform:uppercase;">
        ${esc(company.tenCongTy || '')}
      </div>
      <div class="doc-title">BẢNG KÊ CHI TIẾT PHIẾU NHẬP VẬT LIỆU</div>
      <div class="doc-center" style="margin-bottom:6px; font-size:11pt; color:red; font-weight:bold;">
        Từ ngày ${formatDate(dateFrom)} đến ngày ${formatDate(dateTo)}
      </div>
      <div class="doc-center" style="margin-bottom:12px; font-size:11pt; font-weight:bold; text-transform:uppercase;">
        TÊN VẬT LIỆU: ${esc(product.ten || 'Đá cấp phối 375')}
      </div>
      <table>
        <tr>
          <th style="width:5%;">TT</th>
          <th style="width:12%;">Số phiếu (Ngày)</th>
          <th style="width:14%;">Biển số xe</th>
          <th>Tên hàng hóa</th>
          <th style="width:6%;">ĐVT</th>
          <th style="width:10%;">Số chuyến</th>
          <th style="width:12%;">KL/chuyến (m3)</th>
          <th style="width:12%;">T.KL (m3)</th>
        </tr>
        ${rows}
        <tr style="font-weight:bold;background:#c7d7fd;">
          <td colspan="5" class="text-right">TỔNG CỘNG</td>
          <td class="text-center">${tongTatCaChuyến}</td>
          <td class="text-right">${fmtNum(tongTatCaKLChuyen)}</td>
          <td class="text-right">${fmtNum(tongTatCaKL)}</td>
        </tr>
      </table>
      <div style="margin-top:8px;font-style:italic;font-size:10pt;text-align:right;">Hôm nay là ngày ${currentDay(form.ngayLap)} tháng ${currentMonth(form.ngayLap)} năm ${currentYear(form.ngayLap)}</div>
      <div class="doc-sig-row">
        <div class="doc-sig">
          <div class="doc-sig-title" style="font-size:14pt; font-weight:bold;">${esc(customer.tenCongTy || 'BÊN MUA')}</div>
          <div style="font-style:italic;font-size:10pt;">(Ký, đóng dấu)</div>
          <div class="doc-sig-space"></div>
        </div>
        <div class="doc-sig">
          <div class="doc-sig-title" style="font-size:14pt; font-weight:bold;">${esc(company.tenCongTy || '')}</div>
          <div style="font-style:italic;font-size:10pt;">(Ký, đóng dấu)</div>
          <div class="doc-sig-space"></div>
        </div>
      </div>
    </div>`;
            }
        };

    </script>
    <script>
        // =====================================================
        //  js/app.js - Main Application Logic
        // =====================================================

        // ─── Global State ────────────────────────────────────
        const State = {
            page: 'dashboard',
            customers: [],
            products: [],
            deliveries: [],
            config: {},
            filters: { deliv: { dateFrom: '', dateTo: '', khachHangId: '', bienSoXe: '' } },
            doc: {
                khachHangId: '', sanPhamId: '', dateFrom: '', dateTo: '',
                soHopDong: '', soBBGT: '', soBBKL: '', soDDH: '', soPhieu: '',
                congTrinh: '', ngayLap: '', donGiaDa: '', donGiaVC: '',
                duNoDauKy: 0, daTra: 0, tongKL: 0
            },
            activeDoc: 0   // 0-5 for the 6 documents
        };

        // ─── Init ─────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', async () => {
            initNav();
            initDateDefaults();
            loadApiUrl();

            const url = localStorage.getItem('tqc_api_url');
            if (url) {
                DB.setUrl(url);
                await loadAllData();
            } else {
                renderDashboard();
                showPage('dashboard');
            }
        });

        function loadApiUrl() {
            const url = localStorage.getItem('tqc_api_url') || '';
            const inp = document.getElementById('api-url-input');
            if (inp) inp.value = url;
            if (!url) {
                document.querySelectorAll('.api-required').forEach(el => el.classList.add('hidden'));
                document.getElementById('api-banner')?.classList.remove('hidden');
            }
        }

        function initDateDefaults() {
            const range = currentMonthRange();
            State.filters.deliv.dateFrom = range.from;
            State.filters.deliv.dateTo = range.to;
            State.doc.dateFrom = range.from;
            State.doc.dateTo = range.to;
            State.doc.ngayLap = todayISO();
        }

        // ─── Navigation ──────────────────────────────────────
        function initNav() {
            document.querySelectorAll('.nav-item').forEach(el => {
                el.addEventListener('click', () => {
                    const page = el.dataset.page;
                    if (page) navigateTo(page);
                });
            });
        }

        function navigateTo(page) {
            State.page = page;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
            document.querySelectorAll('.page').forEach(el => el.classList.toggle('active', el.id === 'page-' + page));
            document.querySelector('.topbar-title').textContent = pageTitles[page] || 'TQC';

            switch (page) {
                case 'dashboard': renderDashboard(); break;
                case 'khachhang': renderCustomers(); break;
                case 'vanchuyen': renderDeliveries(); break;
                case 'sanpham': renderProducts(); break;
                case 'giayto': renderDocPage(); break;
                case 'caidat': renderSettings(); break;
            }
        }

        const pageTitles = {
            dashboard: 'Tổng quan',
            khachhang: 'Quản lý Khách hàng',
            vanchuyen: 'Quản lý Vận chuyển',
            sanpham: 'Danh mục Sản phẩm',
            giayto: 'Tạo Giấy tờ',
            caidat: 'Cài đặt'
        };

        // ─── Load Data ───────────────────────────────────────
        async function loadAllData() {
            showLoading('Đang tải dữ liệu...');
            try {
                const data = await DB.loadAll();
                State.customers = data.customers || [];
                State.products = data.products || [];
                State.deliveries = data.deliveries || [];
                State.config = data.config || {};
                renderDashboard();
                showPage('dashboard');
                showToast('Tải dữ liệu thành công', 'success');
            } catch (e) {
                showToast('Lỗi tải dữ liệu: ' + e.message, 'error', 5000);
                renderDashboard();
                showPage('dashboard');
            } finally {
                hideLoading();
            }
        }

        function showPage(page) {
            navigateTo(page);
        }

        // ─── DASHBOARD ────────────────────────────────────────
        function renderDashboard() {
            const now = new Date();
            const y = now.getFullYear(), m = now.getMonth();
            const monthDelivs = State.deliveries.filter(d => {
                const dd = new Date(d.ngay + 'T00:00:00');
                return dd.getFullYear() === y && dd.getMonth() === m;
            });
            const { tongChuyến: tc, tongKL: tkl } = calcTotals(monthDelivs);

            // Recent 7 days chart data
            const recentDays = [];
            for (let i = 6; i >= 0; i--) {
                const day = new Date(); day.setDate(day.getDate() - i);
                const iso = day.toISOString().slice(0, 10);
                const dayDelivs = State.deliveries.filter(d => d.ngay === iso);
                const { tongKL } = calcTotals(dayDelivs);
                recentDays.push({ date: iso, kl: tongKL, label: `${day.getDate()}/${day.getMonth() + 1}` });
            }
            const maxKL = Math.max(...recentDays.map(d => d.kl), 1);

            const chartBars = recentDays.map(d => `
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;">
      <div style="font-size:0.65rem;color:#64748b;">${fmtNum(d.kl, 1)}</div>
      <div style="width:100%;background:#2563eb;border-radius:4px 4px 0 0;height:${Math.max((d.kl / maxKL) * 80, 2)}px;transition:height .5s;"></div>
      <div style="font-size:0.65rem;color:#94a3b8;">${d.label}</div>
    </div>`).join('');

            document.getElementById('page-dashboard').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Tổng quan</div><div class="page-subtitle">${new Date().toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div></div>
      <button class="btn btn-primary" onclick="loadAllData()">🔄 Làm mới</button>
    </div>
    ${!localStorage.getItem('tqc_api_url') ? `<div class="api-banner" id="api-banner">
      <span class="api-banner-icon">⚠️</span>
      <div class="api-banner-text"><strong>Chưa kết nối Google Sheets</strong>Vào <a href="#" onclick="navigateTo('caidat')" style="color:#92400e;font-weight:600;">Cài đặt</a> để nhập URL Google Apps Script và kết nối dữ liệu.</div>
    </div>` : ''}
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-label">Khách hàng</div>
        <div class="stat-value">${State.customers.length}</div>
        <div class="stat-unit">đối tác</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon">🚛</div>
        <div class="stat-label">Chuyến tháng này</div>
        <div class="stat-value">${tc}</div>
        <div class="stat-unit">chuyến xe</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-icon">⛏️</div>
        <div class="stat-label">Khối lượng tháng này</div>
        <div class="stat-value">${fmtNum(tkl, 1)}</div>
        <div class="stat-unit">m³</div>
      </div>
      <div class="stat-card cyan">
        <div class="stat-icon">📦</div>
        <div class="stat-label">Loại sản phẩm</div>
        <div class="stat-value">${State.products.length}</div>
        <div class="stat-unit">mặt hàng</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;">
      <div class="card">
        <div class="card-header"><span class="card-title">📊 Khối lượng 7 ngày gần nhất (m³)</span></div>
        <div class="card-body">
          <div style="display:flex;align-items:flex-end;gap:6px;height:100px;padding:0 4px;">
            ${chartBars}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">🔔 Hoạt động gần đây</span></div>
        <div class="card-body" style="padding:12px;">
          ${State.deliveries.slice(-5).reverse().map(d => {
                const kh = State.customers.find(c => c.id === d.khachHangId);
                const tKL = (parseFloat(d.soChuyenCho) || 1) * (parseFloat(d.khoiLuong) || 0);
                return `<div style="padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:0.78rem;">
              <div class="fw-semibold">${formatDate(d.ngay)} – ${esc(d.bienSoXe)}</div>
              <div class="text-muted">${esc(kh?.tenCongTy || 'N/A')} · ${fmtNum(tKL)} m³</div>
            </div>`;
            }).join('') || '<div class="text-muted" style="font-size:0.8rem;">Chưa có dữ liệu</div>'}
        </div>
      </div>
    </div>`;
        }

        // ─── CUSTOMERS PAGE ───────────────────────────────────
        function renderCustomers(search = '') {
            const filtered = State.customers.filter(c =>
                !search || c.tenCongTy?.toLowerCase().includes(search.toLowerCase()) ||
                c.daiDien?.toLowerCase().includes(search.toLowerCase()) ||
                c.maSoThue?.includes(search)
            );

            const rows = filtered.map(c => `
    <tr>
      <td><div class="fw-semibold">${esc(c.tenCongTy)}</div><div class="text-muted" style="font-size:0.72rem;">${esc(c.diaChi || '')}</div></td>
      <td>${esc(c.daiDien || '')}</td>
      <td>${esc(c.chucVu || '')}</td>
      <td><span class="badge badge-blue">${esc(c.maSoThue || '')}</span></td>
      <td><span class="badge badge-yellow">${esc(c.soHopDong || '')}</span></td>
      <td class="td-actions">
        <button class="btn btn-sm btn-outline" onclick="openCustomerModal('${c.id}')">✏️ Sửa</button>
        <button class="btn btn-sm btn-danger" onclick="deleteCustomer('${c.id}')">🗑️</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">👥</div><h3>Chưa có khách hàng</h3><p>Thêm khách hàng đầu tiên</p></div></td></tr>`;

            document.getElementById('page-khachhang').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Khách hàng</div><div class="page-subtitle">${State.customers.length} đối tác</div></div>
      <button class="btn btn-primary" onclick="openCustomerModal()">➕ Thêm khách hàng</button>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="toolbar" style="margin:0;">
          <div class="search-box"><span class="search-icon">🔍</span><input type="text" placeholder="Tìm theo tên, MST..." id="kh-search" value="${esc(search)}" oninput="renderCustomers(this.value)"></div>
          <span class="text-muted" style="font-size:0.78rem;">${filtered.length} kết quả</span>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Tên công ty</th><th>Đại diện</th><th>Chức vụ</th><th>Mã số thuế</th><th>Số HĐ</th><th>Thao tác</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
        }

        function openCustomerModal(id = null) {
            const c = id ? State.customers.find(x => x.id === id) : {};
            const isEdit = !!id;

            document.getElementById('modal-title').textContent = isEdit ? 'Sửa khách hàng' : 'Thêm khách hàng';
            document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label class="form-label">Tên công ty <span class="required">*</span></label>
      <input class="form-control" id="kh-tenCongTy" value="${esc(c.tenCongTy || '')}" placeholder="CÔNG TY TNHH..."></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Đại diện bên mua</label>
        <input class="form-control" id="kh-daiDien" value="${esc(c.daiDien || '')}" placeholder="Nguyễn Văn A"></div>
      <div class="form-group"><label class="form-label">Chức vụ</label>
        <input class="form-control" id="kh-chucVu" value="${esc(c.chucVu || '')}" placeholder="Giám đốc"></div>
    </div>
    <div class="form-group"><label class="form-label">Địa chỉ</label>
      <input class="form-control" id="kh-diaChi" value="${esc(c.diaChi || '')}" placeholder="Số nhà, đường, phường, quận, tỉnh/thành"></div>
    <div class="form-group"><label class="form-label">Mã số thuế</label>
      <input class="form-control" id="kh-maSoThue" value="${esc(c.maSoThue || '')}" placeholder="0400000000"></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Số HĐ / Số phiếu DNTT</label>
        <input class="form-control" id="kh-soHopDong" value="${esc(c.soHopDong || '')}" placeholder="..../HĐ"></div>
      <div class="form-group"><label class="form-label">Công trình</label>
        <input class="form-control" id="kh-congTrinh" value="${esc(c.congTrinh || '')}" placeholder="Tên công trình..."></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Số BB Giá trị</label>
        <input class="form-control" id="kh-soBBGT" value="${esc(c.soBBGT || '')}" placeholder="..../BB"></div>
      <div class="form-group"><label class="form-label">Số BB Khối lượng</label>
        <input class="form-control" id="kh-soBBKL" value="${esc(c.soBBKL || '')}" placeholder="..../BB"></div>
    </div>`;

            document.getElementById('modal-save').onclick = () => saveCustomer(id);
            openModal();
        }

        async function saveCustomer(id) {
            const data = {
                id: id || genId(),
                tenCongTy: document.getElementById('kh-tenCongTy').value.trim(),
                daiDien: document.getElementById('kh-daiDien').value.trim(),
                chucVu: document.getElementById('kh-chucVu').value.trim(),
                diaChi: document.getElementById('kh-diaChi').value.trim(),
                maSoThue: document.getElementById('kh-maSoThue').value.trim(),
                soHopDong: document.getElementById('kh-soHopDong').value.trim(),
                congTrinh: document.getElementById('kh-congTrinh').value.trim(),
                soBBGT: document.getElementById('kh-soBBGT').value.trim(),
                soBBKL: document.getElementById('kh-soBBKL').value.trim(),
            };
            if (!data.tenCongTy) { showToast('Vui lòng nhập tên công ty', 'error'); return; }

            showLoading('Đang lưu...');
            try {
                if (id) {
                    await DB.updateCustomer(id, data);
                    const idx = State.customers.findIndex(c => c.id === id);
                    if (idx >= 0) State.customers[idx] = data;
                    showToast('Đã cập nhật khách hàng', 'success');
                } else {
                    await DB.createCustomer(data);
                    State.customers.push(data);
                    showToast('Đã thêm khách hàng', 'success');
                }
                closeModal();
                renderCustomers();
            } catch (e) {
                showToast('Lỗi: ' + e.message, 'error');
            } finally { hideLoading(); }
        }

        async function deleteCustomer(id) {
            confirmDialog('Xóa khách hàng này?', async () => {
                showLoading('Đang xóa...');
                try {
                    await DB.deleteCustomer(id);
                    State.customers = State.customers.filter(c => c.id !== id);
                    showToast('Đã xóa khách hàng', 'success');
                    renderCustomers();
                } catch (e) { showToast('Lỗi: ' + e.message, 'error'); }
                finally { hideLoading(); }
            });
        }

        // ─── DELIVERIES PAGE ──────────────────────────────────
        function renderDeliveries() {
            const f = State.filters.deliv;
            let delivs = [...State.deliveries];
            if (f.dateFrom) delivs = delivs.filter(d => d.ngay >= f.dateFrom);
            if (f.dateTo) delivs = delivs.filter(d => d.ngay <= f.dateTo);
            if (f.khachHangId) delivs = delivs.filter(d => d.khachHangId === f.khachHangId);
            if (f.bienSoXe) delivs = delivs.filter(d => d.bienSoXe?.toLowerCase().includes(f.bienSoXe.toLowerCase()));
            delivs = sortByDate(delivs).reverse();

            const { tongChuyến, tongKL } = calcTotals(delivs);
            const khOptions = State.customers.map(c => `<option value="${c.id}" ${f.khachHangId === c.id ? 'selected' : ''}>${esc(c.tenCongTy)}</option>`).join('');
            const spMap = Object.fromEntries(State.products.map(p => [p.id, p]));
            const khMap = Object.fromEntries(State.customers.map(c => [c.id, c]));

            const rows = delivs.map(d => {
                const kh = khMap[d.khachHangId];
                const sp = spMap[d.sanPhamId];
                const tKL = (parseFloat(d.soChuyenCho) || 1) * (parseFloat(d.khoiLuong) || 0);
                return `<tr>
      <td class="font-num">${formatDate(d.ngay)}</td>
      <td><span class="badge badge-blue">${esc(d.bienSoXe)}</span></td>
      <td class="text-center">${d.soChuyenCho}</td>
      <td class="text-right font-num">${fmtNum(d.khoiLuong)}</td>
      <td class="text-right font-num fw-semibold">${fmtNum(tKL)}</td>
      <td><span class="text-muted" style="font-size:0.75rem;">${esc(kh?.tenCongTy || '')}</span></td>
      <td><span class="badge badge-green">${esc(sp?.ten || '')}</span></td>
      <td>${esc(d.ghiChu || '')}</td>
      <td class="td-actions">
        <button class="btn btn-sm btn-outline" onclick="openDelivModal('${d.id}')">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="deleteDelivery('${d.id}')">🗑️</button>
      </td>
    </tr>`;
            }).join('') || `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">🚛</div><h3>Không có dữ liệu</h3><p>Thêm chuyến xe đầu tiên hoặc thay đổi bộ lọc</p></div></td></tr>`;

            document.getElementById('page-vanchuyen').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Vận chuyển</div><div class="page-subtitle">${State.deliveries.length} bản ghi tổng cộng</div></div>
      <button class="btn btn-primary" onclick="openDelivModal()">➕ Thêm chuyến xe</button>
    </div>
    <div class="filter-card">
      <div class="filter-grid">
        <div class="form-group" style="margin:0;"><label class="form-label">Từ ngày</label>
          <input type="date" class="form-control" value="${f.dateFrom}" onchange="State.filters.deliv.dateFrom=this.value;renderDeliveries()"></div>
        <div class="form-group" style="margin:0;"><label class="form-label">Đến ngày</label>
          <input type="date" class="form-control" value="${f.dateTo}" onchange="State.filters.deliv.dateTo=this.value;renderDeliveries()"></div>
        <div class="form-group" style="margin:0;"><label class="form-label">Khách hàng</label>
          <select class="form-control" id="filter-deliv-kh" onchange="State.filters.deliv.khachHangId=this.value;renderDeliveries()">

        function exportCurrentDoc() {
            const params = getDocParams();

        function exportAllDocs() {
            const params = getDocParams();

            // 1. Unmistakable Alert if Customer is missing
            if (!params.customer || !params.customer.id) {
                alert('⚠️ LỖI: Bạn chưa chọn Khách hàng!\n\nVui lòng chọn "Khách hàng (Bên mua)" ở biểu mẫu bên trái trước khi xuất file Excel.');
                return;
            }

            // Show the loading overlay so the user knows it's processing
            showLoading('Đang tạo file Excel (6 sheet)...');

            // 2. Use setTimeout to allow the browser to render the loading screen before freezing to calculate
            setTimeout(() => {
                try {
                    const sheetsToExport = DOC_LIST.map(d => ({
                        key: d.key,
                        name: d.sheet,
                        params: params
                    }));

                    exportToExcel(sheetsToExport);
                } catch (error) {
                    console.error("Export Error:", error);
                    alert('❌ Đã xảy ra lỗi khi tạo file Excel:\n' + error.message);
                } finally {
                    // Always hide the loading screen, even if it fails
                    hideLoading();
                }
            }, 100);
        }

        // --- Helper function to create clean, URL-safe filenames ---
        function formatFilename(str) {
            if (!str) return "Khach_Hang";
            return str.normalize("NFD") // Decompose accents
                .replace(/[\u0300-\u036f]/g, "") // Remove accents
                .replace(/đ/g, "d").replace(/Đ/g, "D") // Convert 'Đ'
                .replace(/[^a-zA-Z0-9]/g, "_") // Replace spaces & special chars with underscores
                .replace(/_+/g, "_") // Remove consecutive duplicate underscores
                .replace(/^_|_$/g, ""); // Trim underscores from the start and end
        }

        function exportToExcel(sheets) {
            if (typeof XLSX === 'undefined') {
                alert('❌ Thư viện Excel chưa được tải xong. Hãy kiểm tra kết nối mạng hoặc thử lại sau vài giây.');
                return;
            }

            const wb = XLSX.utils.book_new();

            // Catch errors on a per-sheet basis
            sheets.forEach(({ key, name, params }) => {
                try {
                    const ws = buildWorksheet(key, params);
                    XLSX.utils.book_append_sheet(wb, ws, name);
                } catch (err) {
                    console.error(`Lỗi tại sheet ${name}:`, err);
                    throw new Error(`Xảy ra lỗi khi tạo sheet "${name}": ` + err.message);
                }
            });

            // --- NEW FILENAME LOGIC ---

            // 1. Get raw customer name and format it (Remove the slice so the full name is kept)
            const rawKhName = sheets[0].params.customer?.tenCongTy || 'TQC';
            const cleanKhName = formatFilename(rawKhName);

            // 2. Format the date from YYYY-MM-DD to YYYYMMDD for a cleaner look
            const rawDate = sheets[0].params.form.ngayLap || todayISO();
            const cleanDate = rawDate.replace(/-/g, "");

            // 3. Differentiate between Single Export and All Export
            let docType = "";
            if (sheets.length === 1) {
                // If it's a single sheet, use its key in uppercase (e.g., 'DNTT', 'GT', 'KL')
                docType = sheets[0].key.toUpperCase();
            } else {
                // If it's all 6 sheets
                docType = "TONG_HOP";
            }

            // 4. Construct the final professional filename
            // Example output: TQC_20260616_DNTT_Cong_Ty_TNHH_A.xlsx
            const fname = `TQC_${cleanDate}_${docType}_${cleanKhName}.xlsx`;

            // Trigger download
            XLSX.writeFile(wb, fname);
            showToast('✅ Xuất Excel thành công: ' + fname, 'success');
        }

                    rows.push([`BÊN A (BÊN MUA): ${customer.tenCongTy || ''}`]);
                    rows.push([`  - Người đại diện: ${customer.daiDien || ''}    Chức vụ: ${customer.chucVu || ''}`]);
                    rows.push([`BÊN B (BÊN BÁN): ${company.tenCongTy || ''}`]);
                    rows.push([`  - Người đại diện (Ông): ${company.daiDien || ''}    Chức vụ: ${company.chucVu || 'Giám đốc'}`]);
