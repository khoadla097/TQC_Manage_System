                    rows.push([`Hai bên tiến hành đối chiếu và xác nhận công nợ tính đến hết ngày ${formatDate(dateTo)}`]);
                    rows.push(['I. Số dư đầu kỳ:', '', '', '', duNoDauKy || '-', 'đồng']);
                    rows.push(['II. Số phát sinh trong kỳ:', `(Từ ngày ${formatDate(dateFrom)} đến ngày ${formatDate(dateTo)})`, '', '', phatSinh, 'đồng']);
                    rows.push(['Chi tiết số phát sinh như sau:']);
                    rows.push(['TT', 'NỘI DUNG', 'ĐVT', 'Khối lượng', 'ĐƠN GIÁ (Gồm VAT)', 'THÀNH TIỀN']);
                    rows.push([1, product.ten || 'Đá cấp phối 375', product.donVi || 'm3', form.tongKL, form.donGiaDa, soTienDA]);
                    rows.push([2, 'Vận chuyển đá cấp phối', product.donVi || 'm3', form.tongKL, form.donGiaVC, soTienVC]);
                    rows.push(['Tổng cộng', '', '', '', '', phatSinh]);
                    rows.push(['III. Số đã trả trong kỳ:', '', '', '', daTra || '-', 'đồng']);
                    rows.push(['IV. Số tiền còn phải thanh toán (IV=I+II-III) là:', '', '', '', conNo, 'đồng']);
                    rows.push([`Bằng chữ : ${docSoTien(conNo)}`]);
                    rows.push([`Vậy, Đề nghị ${customer.tenCongTy || ''} xác nhận công nợ và thanh toán số tiền trên cho ${company.tenCongTy || ''} theo HĐNT hai bên đã ký kết.`]);
                    rows.push(['Biên bản được lập thành 04 bản, mỗi bên giữ 02 bản để làm cơ sở hai bên thanh toán.']);
                    rows.push([]);
                    rows.push(['', 'ĐẠI DIỆN BÊN MUA', '', '', 'ĐẠI DIỆN BÊN BÁN']);
                    rows.push(['', '(Ký ghi rõ họ tên)', '', '', '(Ký ghi rõ họ tên)']);
                }
            }

            const ws = XLSX.utils.aoa_to_sheet(rows);
            applyStylesToSheet(ws, docKey, company);
            return ws;
        }

        function applyStylesToSheet(ws, docKey, company) {
            let tableStartRow = -1;
            let tableEndRow = -1;

            // Scan for table range (0-indexed)
            for (const key in ws) {
                if (key.startsWith('!')) continue;
                const cell = ws[key];
                const addr = XLSX.utils.decode_cell(key);
                if (cell.v === 'TT' || cell.v === 'Số TT') {
                    tableStartRow = addr.r;
                }
                if (cell.v === 'TỔNG CỘNG' || cell.v === 'Thành tiền' || cell.v === 'Tổng' || cell.v === 'Tổng cộng') {
                    tableEndRow = addr.r;
                }
            }
            if (docKey === 'kl' && tableStartRow !== -1) {
                tableEndRow = tableStartRow + 1;
            }

            const hasTotalRow = (docKey !== 'kl');

            // Initialize and populate merges
            ws['!merges'] = ws['!merges'] || [];
            const range = XLSX.utils.decode_range(ws['!ref']);
            const maxRow = range.e.r;
            const lastColIdx = range.e.c;

            // Initialize manual row heights array
            ws['!rows'] = ws['!rows'] || [];
            for (let r = 0; r <= maxRow; r++) {
                ws['!rows'][r] = ws['!rows'][r] || { hpt: 18 }; // Default standard row height 18pt
            }

            // 1. Dual Header Merges (Rows 0 and 1)
            if (docKey === 'dntt' || docKey === 'ddh') {
                ws['!merges'].push({ s: { r: 0, c: 0 }, e: { r: 0, c: lastColIdx } });
                ws['!merges'].push({ s: { r: 1, c: 0 }, e: { r: 1, c: lastColIdx } });
            } else if (docKey === 'gt') {
                ws['!merges'].push({ s: { r: 0, c: 0 }, e: { r: 0, c: 3 } });
                ws['!merges'].push({ s: { r: 0, c: 4 }, e: { r: 0, c: 6 } });
                ws['!merges'].push({ s: { r: 1, c: 0 }, e: { r: 1, c: 3 } });
                ws['!merges'].push({ s: { r: 1, c: 4 }, e: { r: 1, c: 6 } });
            } else if (docKey === 'kl' || docKey === 'dc') {
                ws['!merges'].push({ s: { r: 0, c: 0 }, e: { r: 0, c: 2 } });
                ws['!merges'].push({ s: { r: 0, c: 3 }, e: { r: 0, c: 4 } });
                ws['!merges'].push({ s: { r: 1, c: 0 }, e: { r: 1, c: 2 } });
                ws['!merges'].push({ s: { r: 1, c: 3 }, e: { r: 1, c: 4 } });
            }

            // 2. Loop for general merges and row heights
            for (let r = 0; r <= maxRow; r++) {
                const cellA = ws[XLSX.utils.encode_cell({ r, c: 0 })];
                const valA = String(cellA?.v || '');

                // Check if the row should be merged full width
                const isFullWidthRow =
                    valA.startsWith('- Căn cứ') ||
                    valA.startsWith('Căn cứ') ||
                    valA.startsWith('Hôm nay') ||
                    valA.startsWith('Vậy, Đề nghị') ||
                    valA.startsWith('Bằng chữ') ||
                    valA.startsWith('Số tiền trên đề nghị') ||
                    valA.startsWith('Tên đơn vị:') ||
                    valA.startsWith('Tài khoản số:') ||
                    valA.startsWith('Tại ngân hàng:') ||
                    valA.startsWith('Rất mong') ||
                    valA.startsWith('Xin trân trọng') ||
                    valA.startsWith('Trân trọng cảm ơn') ||
                    valA.startsWith('Ghi chú:') ||
                    valA.startsWith('- Đơn giá') ||
                    valA.startsWith('- Địa điểm') ||
                    valA.startsWith('- Thời gian') ||
                    valA.startsWith('- Rất mong') ||
                    valA.startsWith('Hai bên thống nhất') ||
                    valA.startsWith('Chi tiết số phát sinh') ||
                    valA.startsWith('GIẤY ĐỀ NGHỊ') ||
                    valA.startsWith('BIÊN BẢN') ||
                    valA.startsWith('ĐƠN ĐẶT HÀNG') ||
                    valA.startsWith('BẢNG KÊ') ||
                    valA.startsWith('TÊN VẬT LIỆU') ||
                    valA.startsWith('CÔNG TRÌNH:') ||
                    valA.startsWith('ĐỊA ĐIỂM:') ||
                    valA.startsWith('BÊN A (BÊN MUA):') ||
                    valA.startsWith('BÊN B (BÊN BÁN):') ||
                    valA.startsWith('  - ') ||
                    (valA.startsWith('Từ ngày ') && valA.includes('đến ngày '));

                // Calculate dynamic row height for full-width wrapped text rows
                if (isFullWidthRow && valA.length > 0) {
                    const charCount = valA.length;
                    // We assume an average table width can fit ~75 characters per line
                    const estimatedLines = Math.max(1, Math.ceil(charCount / 75));
                    // Each line needs about 17pt, and we add 5pt padding
                    ws['!rows'][r].hpt = estimatedLines * 17 + 5;
                }

                if (docKey === 'da375') {
                    if (valA.startsWith('Xe ')) {
                        ws['!merges'].push({ s: { r, c: 0 }, e: { r, c: 7 } });
                    } else if (valA === 'Cộng' || valA === 'TỔNG CỘNG') {
                        ws['!merges'].push({ s: { r, c: 0 }, e: { r, c: 4 } });
                    } else if (isFullWidthRow) {
                        ws['!merges'].push({ s: { r, c: 0 }, e: { r, c: 7 } });
                    }
                } else {
                    if (valA === 'Thành tiền' || valA === 'Tổng' || valA === 'Tổng cộng') {
                        ws['!merges'].push({ s: { r, c: 0 }, e: { r, c: 4 } });
                    } else if (docKey === 'dntt' && (valA === 'Dư nợ đầu kỳ' || valA === 'Phát sinh trong kỳ' || valA.startsWith('Thanh toán giá trị còn nợ'))) {
                        ws['!merges'].push({ s: { r, c: 0 }, e: { r, c: 4 } });
                    } else if (docKey === 'dc' && (valA.startsWith('I. Số dư') || valA.startsWith('II. Số phát') || valA.startsWith('III. Số đã') || valA.startsWith('IV. Số tiền'))) {
                        ws['!merges'].push({ s: { r, c: 0 }, e: { r, c: 3 } });
                    } else if (isFullWidthRow) {
                        ws['!merges'].push({ s: { r, c: 0 }, e: { r, c: lastColIdx } });
                    }
                }
            }

            // 3. Signature Merges (at the end of documents)
            if (docKey === 'da375') {
                // Merge Date Row (maxRow - 2)
                ws['!merges'].push({ s: { r: maxRow - 2, c: 0 }, e: { r: maxRow - 2, c: 7 } });
                // Merge Company Titles (maxRow - 1)
                ws['!merges'].push({ s: { r: maxRow - 1, c: 0 }, e: { r: maxRow - 1, c: 3 } });
                ws['!merges'].push({ s: { r: maxRow - 1, c: 4 }, e: { r: maxRow - 1, c: 7 } });
                // Merge "(Ký, đóng dấu)" (maxRow)
                ws['!merges'].push({ s: { r: maxRow, c: 0 }, e: { r: maxRow, c: 3 } });
                ws['!merges'].push({ s: { r: maxRow, c: 4 }, e: { r: maxRow, c: 7 } });
            } else if (docKey === 'gt' || docKey === 'kl' || docKey === 'ddh' || docKey === 'dc') {
                const startSig = maxRow - 1;
                const endSig = maxRow;
                const midCol = Math.floor(lastColIdx / 2);
                ws['!merges'].push({ s: { r: startSig, c: 1 }, e: { r: startSig, c: midCol } });
                ws['!merges'].push({ s: { r: startSig, c: midCol + 1 }, e: { r: startSig, c: lastColIdx } });
                ws['!merges'].push({ s: { r: endSig, c: 1 }, e: { r: endSig, c: midCol } });
                ws['!merges'].push({ s: { r: endSig, c: midCol + 1 }, e: { r: endSig, c: lastColIdx } });
            }

            // Define standard thin borders
            const thinBorder = {
                top: { style: 'thin', color: { rgb: '000000' } },
                right: { style: 'thin', color: { rgb: '000000' } },
                bottom: { style: 'thin', color: { rgb: '000000' } },
                left: { style: 'thin', color: { rgb: '000000' } }
            };

            for (const key in ws) {
                if (key.startsWith('!')) continue;
                const cell = ws[key];
                const addr = XLSX.utils.decode_cell(key);
                const val = String(cell.v || '');

                // Safely get the value of Column A as a string to prevent type errors
                const colAValue = String(ws['A' + (addr.r + 1)]?.v || '');

                // Row-based conditions
                const isSubtotal = (docKey === 'da375' && tableStartRow !== -1 && colAValue === 'Cộng');
                const isGroup = (docKey === 'da375' && tableStartRow !== -1 && colAValue.startsWith('Xe '));
                const isTotal = (docKey === 'da375' && tableStartRow !== -1 && colAValue === 'TỔNG CỘNG');

                // DNTT row-wide red condition
                const isDnttRedRow = (docKey === 'dntt' && String(ws['A' + (addr.r + 1)]?.v || '').startsWith('Thanh toán giá trị còn nợ'));

                // DC row-wide red condition
                const isDcRedRow = (docKey === 'dc' && String(ws['A' + (addr.r + 1)]?.v || '').startsWith('IV. Số tiền còn phải thanh toán'));

                // Check if the cell is in a merged paragraph row
                const isFullWidthRow =
                    colAValue.startsWith('- Căn cứ') ||
                    colAValue.startsWith('Căn cứ') ||
                    colAValue.startsWith('Hôm nay') ||
                    colAValue.startsWith('Vậy, Đề nghị') ||
                    colAValue.startsWith('Bằng chữ') ||
                    colAValue.startsWith('Số tiền trên đề nghị') ||
                    colAValue.startsWith('Tên đơn vị:') ||
                    colAValue.startsWith('Tài khoản số:') ||
                    colAValue.startsWith('Tại ngân hàng:') ||
                    colAValue.startsWith('Rất mong') ||
                    colAValue.startsWith('Xin trân trọng') ||
                    colAValue.startsWith('Trân trọng cảm ơn') ||
                    colAValue.startsWith('Ghi chú:') ||
                    colAValue.startsWith('- Đơn giá') ||
                    colAValue.startsWith('- Địa điểm') ||
                    colAValue.startsWith('- Thời gian') ||
                    colAValue.startsWith('- Rất mong') ||
                    colAValue.startsWith('Hai bên thống nhất') ||
                    colAValue.startsWith('Chi tiết số phát sinh') ||
                    colAValue.startsWith('GIẤY ĐỀ NGHỊ') ||
                    colAValue.startsWith('BIÊN BẢN') ||
                    colAValue.startsWith('ĐƠN ĐẶT HÀNG') ||
                    colAValue.startsWith('BẢNG KÊ') ||
                    colAValue.startsWith('TÊN VẬT LIỆU') ||
                    colAValue.startsWith('CÔNG TRÌNH:') ||
                    colAValue.startsWith('ĐỊA ĐIỂM:') ||
                    colAValue.startsWith('BÊN A (BÊN MUA):') ||
                    colAValue.startsWith('BÊN B (BÊN BÁN):') ||
                    colAValue.startsWith('  - ') ||
                    (colAValue.startsWith('Từ ngày ') && colAValue.includes('đến ngày '));

                const isHeaderRow = addr.r <= 1;

                // 1. Font styling
                let isBold = false;
                let isItalic = false;
                let fontSize = 12; // Standard size 12
                let fontColor = '000000';

                if (val.includes('GIẤY ĐỀ NGHỊ THANH TOÁN') ||
                    val.includes('BIÊN BẢN XÁC NHẬN GIÁ TRỊ') ||
                    val.includes('BIÊN BẢN XÁC NHẬN KHỐI LƯỢNG') ||
                    val.includes('ĐƠN ĐẶT HÀNG') ||
                    val.includes('BIÊN BẢN ĐỐI CHIẾU CÔNG NỢ') ||
                    val.includes('BẢNG KÊ CHI TIẾT PHIẾU NHẬP VẬT LIỆU')) {
                    isBold = true;
                    fontSize = 15;
                }

                if (val.includes('Từ ngày') ||
                    val.includes('Bằng chữ') ||
                    val.includes('Hai bên cùng nhau tiến hành đối chiếu') ||
                    val.includes('Hai bên cùng nhau đối chiếu khối lượng') ||
                    val.includes('Hai bên tiến hành đối chiếu và xác nhận công nợ')) {
                    fontColor = 'FF0000'; // Red
                }

                if (isDnttRedRow || isDcRedRow) {
                    fontColor = 'FF0000'; // Red
                    isBold = true;
                }

                if (val.startsWith('- Căn cứ') ||
                    val.startsWith('Căn cứ') ||
                    val.startsWith('Hôm nay') ||
                    val.startsWith('Biên bản được lập') ||
                    val.startsWith('Vậy, Đề nghị') ||
                    val.includes('(Ký') ||
                    val.includes('Xin trân trọng cảm ơn') ||
                    val.includes('Rất mong được') ||
                    val.includes('Chi tiết số phát sinh')) {
                    isItalic = true;
                }

                if (val.startsWith('CÔNG TY') ||
                    val.startsWith('BÊN A') ||
                    val.startsWith('BÊN B') ||
                    val.startsWith('ĐẠI DIỆN') ||
                    val.startsWith('Tên đơn vị') ||
                    val.startsWith('Tài khoản số') ||
                    val.startsWith('Tại ngân hàng') ||
                    val.startsWith('Số tiền trên đề nghị') ||
                    val.startsWith('I.') ||
                    val.startsWith('II.') ||
                    val.startsWith('III.') ||
                    val.startsWith('IV.') ||
                    val.startsWith('CỘNG HÒA') ||
                    val.startsWith('Độc lập') ||
                    val.startsWith('Độc Lập') ||
                    val.startsWith('TQC') ||
                    isGroup ||
                    isSubtotal ||
                    isTotal) {
                    isBold = true;
                }

                if (addr.r >= 9 && addr.r <= 13) {
                    if (val === 'Đặng Ngọc Phi Long' || val === 'Bùi Thị Kiều Trang' || val === 'Nguyễn Sỹ Dũng' || val === 'Giám đốc' || val === 'Kế toán' || val === 'Chỉ Huy Trưởng') {
                        isBold = true;
                    }
                }

                if (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) {
                    if (addr.r === tableStartRow || (hasTotalRow && addr.r === tableEndRow)) {
                        isBold = true;
                    }

                    // Specifically for kl volume cell
                    if (docKey === 'kl' && addr.r === tableStartRow + 1 && addr.c === 3) {
                        isBold = true;
                    }
                }

                // Specially style company signature name titles in Bảng Kê (last row) to be Bold and size 14
                if (docKey === 'da375' && addr.r >= maxRow - 1 && (addr.c === 0 || addr.c === 4)) {
                    isBold = true;
                    fontSize = 14;
                }

                cell.s = {
                    font: {
                        name: 'Times New Roman',
                        sz: fontSize,
                        bold: isBold,
                        italic: isItalic,
                        color: { rgb: fontColor }
                    }
                };

                // 2. Borders (Apply thin borders inside table range)
                if (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) {
                    cell.s.border = thinBorder;
                }

                // 3. Background Fills
                let fillColor = null;
                if (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) {
                    if (addr.r === tableStartRow) {
                        fillColor = 'F2F2F2'; // Light gray header
                    } else if (addr.r === tableEndRow) {
                        if (docKey === 'da375') {
                            fillColor = 'C7D7FD'; // Blue
                        } else {
                            fillColor = null; // White (no fill) for gt, ddh, dc total rows
                        }
                    } else {
                        if (docKey === 'da375') {
                            if (isSubtotal) {
                                fillColor = 'E8F0FE'; // Light blue subtotal
                            } else if (isGroup) {
                                fillColor = 'F5F5F5'; // Light gray group
                            }
                        } else {
                            if (addr.c === 3) {
                                fillColor = 'FEF08A'; // Yellow volume cell
                            }
                        }
                    }
                }
                if (fillColor) {
                    cell.s.fill = {
                        patternType: 'solid',
                        fgColor: { rgb: fillColor }
                    };
                }

                // 4. Alignments
                let alignH = 'left';
                if (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) {
                    if (docKey === 'da375') {
                        if (addr.c === 0 || addr.c === 1 || addr.c === 2 || addr.c === 4 || addr.c === 5) {
                            alignH = 'center';
                        } else if (addr.c === 6 || addr.c === 7) {
                            alignH = 'right';
                        } else {
                            alignH = 'left';
                        }
                        if (addr.r > tableStartRow) {
                            if (val === 'Cộng' || val === 'TỔNG CỘNG') {
                                alignH = 'right';
                            }
                        }
                    } else {
                        if (addr.c === 0 || addr.c === 2) {
                            alignH = 'center';
                        } else if (addr.c === 3 || addr.c === 4 || addr.c === 5) {
                            alignH = 'right';
                        } else {
                            alignH = 'left';
                        }
                        if (addr.r > tableStartRow) {
                            if (val === 'Thành tiền' || val === 'Tổng' || val === 'Tổng cộng') {
                                alignH = 'center';
                            }
                        }
                    }
                    if (addr.r === tableStartRow) {
                        alignH = 'center'; // Center all header row cells
                    }
                } else {
                    if (typeof cell.v === 'number') {
                        alignH = 'right';
                    } else {
                        const isCenterText = val.includes('CỘNG HÒA') ||
                            val.includes('Độc lập') ||
                            val.includes('Độc Lập') ||
                            val.includes('GIẤY ĐỀ NGHỊ') ||
                            val.includes('BIÊN BẢN') ||
                            val.includes('ĐƠN ĐẶT HÀNG') ||
                            val.includes('BẢNG KÊ') ||
                            val.includes('TÊN VẬT LIỆU') ||
                            val.includes('ĐẠI DIỆN') ||
                            val.includes('(Ký') ||
                            val.includes('Từ ngày') ||
                            (val.startsWith('CÔNG TY') && val.length < 60) ||
                            val === 'TQC' ||
                            val === 'BÊN MUA' ||
                            val === 'BÊN BÁN';
                        if (isCenterText) {
                            alignH = 'center';
                        } else if (val.startsWith('Hôm nay là ngày')) {
                            alignH = 'right';
                        }
                    }
                }
                const wrap = (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) || isFullWidthRow || isHeaderRow;
                cell.s.alignment = { horizontal: alignH, vertical: 'center', wrapText: wrap };

                // 5. Number formatting
                if (typeof cell.v === 'number') {
                    if (docKey === 'da375') {
                        if (addr.c === 5) {
                            cell.z = '#,##0'; // Trips (integer)
                        } else if (addr.c === 6 || addr.c === 7) {
                            cell.z = '#,##0.00'; // Volumes (decimal)
                        }
                    } else {
                        if (tableStartRow !== -1 && addr.r >= tableStartRow && addr.r <= tableEndRow) {
                            if (addr.c === 3) {
                                cell.z = '#,##0.00'; // Volume (decimal)
                            } else if (addr.c === 4 || addr.c === 5) {
                                cell.z = '#,##0'; // Currency (integer)
                            }
                        } else {
                            cell.z = '#,##0'; // Outside table values
                        }
                    }
                }
            }

            // 6. Column Widths
            if (docKey === 'da375') {
                ws['!cols'] = [
                    { wch: 6 },  // A (TT)
                    { wch: 16 }, // B (Số phiếu/ngày)
                    { wch: 14 }, // C (Biển số xe)
                    { wch: 20 }, // D (Tên hàng)
                    { wch: 8 },  // E (ĐVT)
                    { wch: 12 }, // F (Số chuyến)
                    { wch: 16 }, // G (KL/chuyến)
                    { wch: 16 }  // H (T.KL)
                ];
            } else if (docKey === 'gt') {
                ws['!cols'] = [
                    { wch: 8 },  // A (Số TT)
                    { wch: 26 }, // B (Nội dung)
                    { wch: 8 },  // C (Đơn vị)
                    { wch: 14 }, // D (Khối lượng)
                    { wch: 20 }, // E (Đơn giá)
                    { wch: 22 }, // F (Thành tiền)
                    { wch: 10 }  // G (Ghi chú)
                ];
            } else if (docKey === 'kl') {
                ws['!cols'] = [
                    { wch: 8 },  // A (TT)
                    { wch: 26 }, // B (Nội dung)
                    { wch: 8 },  // C (ĐVT)
                    { wch: 16 }, // D (Khối lượng)
                    { wch: 14 }  // E (Ghi chú)
                ];
            } else if (docKey === 'ddh') {
                ws['!cols'] = [
                    { wch: 8 },  // A (TT)
                    { wch: 26 }, // B (Nội dung)
                    { wch: 8 },  // C (ĐVT)
                    { wch: 16 }, // D (Khối lượng)
                    { wch: 20 }, // E (Đơn giá)
                    { wch: 22 }  // F (Thành tiền)
                ];
            } else if (docKey === 'dc') {
                ws['!cols'] = [
                    { wch: 8 },  // A (TT)
                    { wch: 26 }, // B (Nội dung)
                    { wch: 8 },  // C (ĐVT)
                    { wch: 16 }, // D (Khối lượng)
                    { wch: 20 }, // E (Đơn giá)
                    { wch: 22 }  // F (Thành tiền)
                ];
            } else if (docKey === 'dntt') {
                ws['!cols'] = [
                    { wch: 12 }, // A
                    { wch: 12 }, // B
                    { wch: 12 }, // C
                    { wch: 12 }, // D
                    { wch: 12 }, // E
                    { wch: 22 }, // F
                    { wch: 8 }   // G
                ];
            }
        }

        // ─── SETTINGS PAGE ───────────────────────────────────
        function renderSettings() {
            const c = State.config;
            document.getElementById('page-caidat').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Cài đặt</div><div class="page-subtitle">Thông tin công ty & kết nối Google Sheets</div></div>
    </div>
    <div class="settings-grid">
      <div>
        <div class="card" style="margin-bottom:16px;">
          <div class="card-header"><span class="card-title">🔗 Kết nối Google Sheets</span></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">URL Google Apps Script Web App <span class="required">*</span></label>
              <input class="form-control" id="api-url-input" value="${esc(localStorage.getItem('tqc_api_url') || '')}" placeholder="https://script.google.com/macros/s/.../exec">
              <div class="form-hint">Xem hướng dẫn setup trong file SETUP.md</div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn btn-primary" onclick="saveApiUrl()">💾 Lưu & Kết nối</button>
              <button class="btn btn-outline" onclick="initGoogleDB()">⚙️ Khởi tạo Database</button>
              <button class="btn btn-secondary" onclick="loadAllData()">🔄 Tải lại dữ liệu</button>
            </div>
            <div id="api-status" style="margin-top:10px;font-size:0.78rem;"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">💾 Sao lưu dữ liệu</span></div>
          <div class="card-body">
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn btn-outline" onclick="exportBackup()">⬇️ Xuất backup JSON</button>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">🏢 Thông tin công ty TQC</span>
            <button class="btn btn-primary btn-sm" onclick="saveCompanyInfo()">💾 Lưu thông tin</button>
          </div>
          <div class="card-body">
            <div class="form-group"><label class="form-label">Tên công ty</label>
              <input class="form-control" id="cfg-tenCongTy" value="${esc(c.tenCongTy || 'CÔNG TY TNHH TƯ VẤN VÀ XÂY DỰNG TQC')}"></div>
            <div class="form-grid">
              <div class="form-group"><label class="form-label">Người đại diện</label>
                <input class="form-control" id="cfg-daiDien" value="${esc(c.daiDien || '')}"></div>
              <div class="form-group"><label class="form-label">Chức vụ</label>
                <input class="form-control" id="cfg-chucVu" value="${esc(c.chucVu || 'Giám đốc')}"></div>
            </div>
            <div class="form-group"><label class="form-label">Địa chỉ</label>
              <input class="form-control" id="cfg-diaChi" value="${esc(c.diaChi || '')}"></div>
            <div class="form-group"><label class="form-label">Mã số thuế</label>
              <input class="form-control" id="cfg-maSoThue" value="${esc(c.maSoThue || '')}"></div>
            <div class="form-grid">
              <div class="form-group"><label class="form-label">Số tài khoản</label>
                <input class="form-control" id="cfg-soTaiKhoan" value="${esc(c.soTaiKhoan || '')}"></div>
              <div class="form-group"><label class="form-label">Ngân hàng</label>
                <input class="form-control" id="cfg-nganHang" value="${esc(c.nganHang || '')}"></div>
            </div>
            <div class="form-grid">
              <div class="form-group"><label class="form-label">Kế toán</label>
                <input class="form-control" id="cfg-keToan" value="${esc(c.keToan || c.keNgayChuoi || '')}"></div>
              <div class="form-group"><label class="form-label">Thành phố</label>
                <input class="form-control" id="cfg-thanhPho" value="${esc(c.thanhPho || 'Đà Nẵng')}"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Danh sách biển số xe (Mỗi dòng một biển số)</label>
              <textarea class="form-control" id="cfg-bienSoXeList" rows="3" placeholder="92H-123.45&#10;92H-678.90">${esc(c.bienSoXeList || '')}</textarea>
            </div>
          </div>
        </div>
      </div>
    </div>`;
        }

        async function saveApiUrl() {
            const url = document.getElementById('api-url-input').value.trim();
            if (!url) { showToast('Vui lòng nhập URL', 'error'); return; }
            localStorage.setItem('tqc_api_url', url);
            DB.setUrl(url);
            document.getElementById('api-status').innerHTML = '<span style="color:green;">✅ Đã lưu URL. Đang tải dữ liệu...</span>';
            await loadAllData();
            showToast('Kết nối thành công!', 'success');
        }

        async function initGoogleDB() {
            showLoading('Đang khởi tạo database...');
            try {
                await DB.initDB();
                showToast('Khởi tạo database thành công!', 'success');
                await loadAllData();
            } catch (e) { showToast('Lỗi: ' + e.message, 'error'); }
            finally { hideLoading(); }
        }

        async function saveCompanyInfo() {
            const cfg = {
                tenCongTy: document.getElementById('cfg-tenCongTy').value.trim(),
                daiDien: document.getElementById('cfg-daiDien').value.trim(),
                chucVu: document.getElementById('cfg-chucVu').value.trim(),
                diaChi: document.getElementById('cfg-diaChi').value.trim(),
                maSoThue: document.getElementById('cfg-maSoThue').value.trim(),
                soTaiKhoan: document.getElementById('cfg-soTaiKhoan').value.trim(),
                nganHang: document.getElementById('cfg-nganHang').value.trim(),
                keToan: document.getElementById('cfg-keToan').value.trim(),
                thanhPho: document.getElementById('cfg-thanhPho').value.trim(),
                bienSoXeList: document.getElementById('cfg-bienSoXeList').value.trim(),
            };
            showLoading('Đang lưu...');
            try {
                await DB.saveConfig(cfg);
                State.config = { ...State.config, ...cfg };
                showToast('Đã cập nhật thông tin công ty', 'success');
            } catch (e) { showToast('Lỗi: ' + e.message, 'error'); }
            finally { hideLoading(); }
        }

        function exportBackup() {
            const data = {
                exported: new Date().toISOString(),
                customers: State.customers,
                products: State.products,
                deliveries: State.deliveries,
                config: State.config
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `TQC_backup_${todayISO()}.json`; a.click();
            showToast('Đã xuất backup', 'success');
        }

        // ─── MODAL ────────────────────────────────────────────
        function openModal() {
            document.getElementById('global-modal').classList.add('open');
        }
        function closeModal() {
            document.getElementById('global-modal').classList.remove('open');
        }
        // Close on backdrop click
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('global-modal')?.addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });
        });

    </script>

    <script>
        // Update topbar date
        const d = new Date();
        document.getElementById('topbar-date').textContent =
            d.toLocaleDateString('vi-VN', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
    </script>
    <script>
        // Nhan dien URL Web App duoc truyen tu Google Apps Script server
        window.addEventListener('DOMContentLoaded', () => {
            var webAppUrl = '<?= webAppUrl ?>';
            if (webAppUrl && webAppUrl.indexOf('http') === 0) {
                localStorage.setItem('tqc_api_url', webAppUrl);
                if (typeof DB !== 'undefined' && typeof DB.setUrl === 'function') {
                    DB.setUrl(webAppUrl);
                }
                console.log('Tu dong ket noi Google Apps Script API:', webAppUrl);

                // An nut banner canh bao ket noi
                const banner = document.getElementById('api-banner');
                if (banner) banner.classList.add('hidden');
                document.querySelectorAll('.api-required').forEach(el => el.classList.remove('hidden'));
            }
        });
    </script>
</body>
