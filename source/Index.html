<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQC – Hệ thống Quản lý Vật liệu Xây dựng</title>
    <meta name="description"
        content="Hệ thống quản lý bán hàng, vận chuyển đá và xuất giấy tờ cho Công ty TNHH Tư Vấn và Xây Dựng TQC">
    <style>
        /* =====================================================
   TQC MANAGEMENT SYSTEM - MAIN STYLES
   Design: Minimalism + Modern Tech (White + Blue Pastel)
   Font: Be Vietnam Pro
===================================================== */

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');

        /* ─── CSS Variables ──────────────────────────────── */
        :root {
            --primary: #3A4F29;
            /* Forest Green */
            --primary-light: #526B3E;
            --primary-pale: #E8EDE5;
            --primary-dark: #2C401A;
            --accent: #8DB223;
            /* Bright Green Accent */
            --bg-gradient: #F9F8F3;
            /* Cream Background */
            --sidebar-w: 220px;
            --white: #ffffff;
            --text-dark: #2B2B2B;
            --text-muted: #5A5A5A;
            --text-light: #A0A0A0;
            --border: #E5E2D9;
            --border-light: #F0EDE4;
            --success: #3A4F29;
            --success-pale: #E8EDE5;
            --danger: #D32F2F;
            --danger-pale: #FFEBEE;
            --warning: #F57C00;
            --warning-pale: #FFF3E0;
            --info: #0288D1;
            --shadow-sm: 0 2px 4px rgba(43, 43, 43, .04);
            --shadow: 0 8px 24px rgba(43, 43, 43, .06);
            --shadow-lg: 0 16px 48px rgba(43, 43, 43, .08);
            --radius: 20px;
            /* Pill-like cards */
            --radius-sm: 12px;
            --radius-lg: 24px;
            --radius-pill: 999px;
            /* For buttons */
            --transition: all 0.25s cubic-bezier(.4, 0, .2, 1);
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        /* ─── Reset & Base ───────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 14px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-dark);
            display: flex;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .brand-text,
        .page-title,
        .stat-value,
        .topbar-title {
            font-family: var(--font-heading);
            font-weight: 700;
        }

        /* ─── Scrollbar ──────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 99px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* ─── Sidebar ────────────────────────────────────── */
        #sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--white);
            box-shadow: 4px 0 24px rgba(30, 58, 95, .08);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-logo {
            padding: 20px 16px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-logo .logo-badge {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .sidebar-logo .company-name {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .sidebar-logo .company-sub {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 0;
            overflow-y: auto;
        }

        .nav-section-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 16px 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 0;
            transition: var(--transition);
            border-left: 3px solid transparent;
            margin: 1px 0;
            text-decoration: none;
        }

        .nav-item:hover {
            background: var(--primary-pale);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary-pale);
            color: var(--primary);
            font-weight: 600;
            border-left-color: var(--primary);
        }

        .nav-item .nav-icon {
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 16px;
            border-top: 1px solid var(--border-light);
            font-size: 0.72rem;
            color: var(--text-light);
        }

        /* ─── Main Content ───────────────────────────────── */
        #main {
            margin-left: var(--sidebar-w);
            flex: 1;
            min-height: 100vh;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* ─── Top Bar ────────────────────────────────────── */
        .topbar {
            background: rgba(255, 255, 255, .8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ─── Page Content ───────────────────────────────── */
        .page {
            display: none;
            padding: 14px 20px;
            animation: fadeIn .2s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .page-subtitle {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ─── Cards ──────────────────────────────────────── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .card-body {
            padding: 20px;
        }

        /* ─── Stats Grid ─────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary);
        }

        .stat-card.green::before {
            background: var(--success);
        }

        .stat-card.orange::before {
            background: var(--warning);
        }

        .stat-card.cyan::before {
            background: var(--info);
        }

        .stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 6px 0 2px;
            line-height: 1;
        }

        .stat-unit {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .stat-icon {
            position: absolute;
            right: 16px;
            top: 16px;
            font-size: 1.6rem;
            opacity: .15;
        }

        /* ─── Buttons ────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            white-space: nowrap;
            font-family: var(--font-body);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(37, 99, 235, .3);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--border-light);
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary-pale);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
        }

        .btn-ghost:hover {
            background: var(--border-light);
            color: var(--text-dark);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 0.73rem;
        }

        .btn-lg {
            padding: 11px 22px;
            font-size: 0.9rem;
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ─── Table ──────────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        thead tr {
            background: var(--border-light);
        }

        th {
            text-align: left;
            padding: 14px 16px;
            font-weight: 600;
            font-size: 0.73rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-dark);
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background: var(--primary-pale);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .td-actions {
            display: flex;
            gap: 4px;
        }

        /* ─── Search & Filter Bar ────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 7px 12px;
            flex: 1;
            min-width: 200px;
            max-width: 300px;
        }

        .search-box input {
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.82rem;
            color: var(--text-dark);
            width: 100%;
        }

        .search-box .search-icon {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* ─── Form & Inputs ──────────────────────────────── */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-label .required {
            color: var(--danger);
            margin-left: 2px;
        }

        .form-control {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.83rem;
            color: var(--text-dark);
            background: var(--white);
            transition: var(--transition);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }

        .form-control::placeholder {
            color: var(--text-light);
        }

        select.form-control {
            cursor: pointer;
        }

        .form-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        /* ─── Modal ──────────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .45);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn .25s cubic-bezier(.34, 1.56, .64, 1);
        }

        .modal-lg {
            max-width: 820px;
        }

        .modal-xl {
            max-width: 1100px;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(.93) translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.3rem;
            padding: 2px;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .modal-body {
            padding: 20px 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* ─── Toast ──────────────────────────────────────── */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius);
            background: var(--text-dark);
            color: white;
            font-size: 0.82rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            min-width: 250px;
            animation: toastIn .3s cubic-bezier(.34, 1.56, .64, 1);
        }

        .toast.success {
            background: #065f46;
            border-left: 3px solid var(--success);
        }

        .toast.error {
            background: #7f1d1d;
            border-left: 3px solid var(--danger);
        }

        .toast.info {
            background: #1e3a5f;
            border-left: 3px solid var(--accent);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ─── Loading ────────────────────────────────────── */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, .75);
            backdrop-filter: blur(2px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        /* ─── Empty State ────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: .4;
        }

        .empty-state h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-dark);
        }

        .empty-state p {
            font-size: 0.8rem;
        }

        /* ─── Badge ──────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 0.68rem;
            font-weight: 600;
        }

        .badge-blue {
            background: var(--primary-pale);
            color: var(--primary);
        }

        .badge-green {
            background: var(--success-pale);
            color: #065f46;
        }

        .badge-red {
            background: var(--danger-pale);
            color: #991b1b;
        }

        .badge-yellow {
            background: var(--warning-pale);
            color: #92400e;
        }

        /* ─── Divider ────────────────────────────────────── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        /* ─── Document Preview ───────────────────────────── */
        .doc-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--border-light);
            padding: 4px;
            border-radius: var(--radius);
        }

        .doc-tab {
            flex: 1;
            text-align: center;
            padding: 8px 6px;
            border-radius: var(--radius-sm);
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .doc-tab.active {
            background: var(--white);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .doc-preview-wrap {
            background: #e2e8f0;
            padding: 16px;
            border-radius: var(--radius);
            overflow-y: auto;
            max-height: calc(100vh - 210px);
        }


        .doc-a4 {
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm 18mm;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .15);
            font-family: 'Times New Roman', Times, serif;
            font-size: 12pt;
            color: #000;
            line-height: 1.5;
        }

        .doc-a4 table,
        .doc-a4 th,
        .doc-a4 td {
            font-family: 'Times New Roman', Times, serif;
        }

        .doc-a4 .doc-company-header {
            text-align: center;
        }

        .doc-a4 .doc-vn-header {
            font-weight: bold;
            font-size: 12pt;
            text-align: center;
        }

        .doc-a4 .doc-vn-sub {
            font-size: 11pt;
            text-align: center;
            text-decoration: underline;
        }

        .doc-a4 .doc-date-right {
            text-align: right;
            font-style: italic;
            margin-top: 4px;
        }

        .doc-a4 .doc-title {
            text-align: center;
            font-weight: bold;
            font-size: 14pt;
            margin: 12px 0 4px;
            text-transform: uppercase;
        }

        .doc-a4 .doc-subtitle {
            text-align: center;
            font-style: italic;
            font-size: 11pt;
            margin-bottom: 16px;
        }

        .doc-a4 .doc-section {
            margin: 8px 0;
        }

        .doc-a4 .doc-bold {
            font-weight: bold;
        }

        .doc-a4 .doc-underline {
            text-decoration: underline;
        }

        .doc-a4 .doc-center {
            text-align: center;
        }

        .doc-a4 table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 11pt;
        }

        .doc-a4 table th,
        .doc-a4 table td {
            border: 1px solid #000;
            padding: 4px 6px;
        }

    <script>
        // =====================================================
        //  js/utils.js - Utility Functions
        // =====================================================

        // ─── ID Generator ─────────────────────────────────
        function genId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        }

        // ─── Date Helpers ─────────────────────────────────
        function todayISO() {
            return new Date().toISOString().slice(0, 10);
        }
        function formatDate(isoStr) {
            if (!isoStr) return '';
            const d = new Date(isoStr + 'T00:00:00');
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }
        function formatDateLong(isoStr) {
            if (!isoStr) return '';
            const d = new Date(isoStr + 'T00:00:00');
            return `ngày ${d.getDate()} tháng ${d.getMonth() + 1} năm ${d.getFullYear()}`;
        }
        function currentDay(dateStr) { const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date(); return d.getDate(); }
        function currentMonth(dateStr) { const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date(); return d.getMonth() + 1; }
        function currentYear(dateStr) { const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date(); return d.getFullYear(); }

        // ─── Number Formatter ─────────────────────────────
        function fmtNum(n, digits = 2) {
            if (n === undefined || n === null || n === '') return '';
            const v = parseFloat(n) || 0;
            return v.toLocaleString('vi-VN', { minimumFractionDigits: 0, maximumFractionDigits: digits });
        }
        function fmtCurrency(n) {
            const v = parseFloat(n) || 0;
            return v.toLocaleString('vi-VN') + ' đồng';
        }
        function fmtCurrencyShort(n) {
            const v = parseFloat(n) || 0;
            return v.toLocaleString('vi-VN');
        }

        // ─── Vietnamese Number → Words ────────────────────
        function docSoTien(amount) {
            const num = Math.round(parseFloat(amount) || 0);
            if (num === 0) return 'Không đồng';

            const DV = ['', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín'];

            function doc3so(n) {
                if (n === 0) return '';
                const tram = Math.floor(n / 100);
                const chuc = Math.floor((n % 100) / 10);
                const dv = n % 10;
                let s = '';
                if (tram > 0) s += DV[tram] + ' trăm';
                if (chuc === 0 && dv > 0) {
                    s += (tram > 0 ? ' lẻ ' : '') + DV[dv];
                } else if (chuc === 1) {
                    s += ' mười';
                    if (dv === 5) s += ' lăm';
                    else if (dv > 0) s += ' ' + DV[dv];
                } else if (chuc > 1) {
                    s += ' ' + DV[chuc] + ' mươi';
                    if (dv === 1) s += ' mốt';
                    else if (dv === 5) s += ' lăm';
                    else if (dv > 0) s += ' ' + DV[dv];
                }
                return s.trim();
            }

            const ty = Math.floor(num / 1e9);
            const trieu = Math.floor((num % 1e9) / 1e6);
            const nghin = Math.floor((num % 1e6) / 1e3);
            const con = num % 1e3;

            let parts = [];
            if (ty > 0) parts.push(doc3so(ty) + ' tỷ');
            if (trieu > 0) parts.push(doc3so(trieu) + ' triệu');
            if (nghin > 0) parts.push(doc3so(nghin) + ' nghìn');
            if (con > 0) parts.push(doc3so(con));

            let result = parts.join(' ');
            result = result.charAt(0).toUpperCase() + result.slice(1);
            return result + ' đồng';
        }

        // ─── HTML Escape ───────────────────────────────────
        function esc(str) {
            return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ─── Deep clone ───────────────────────────────────
        function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

        // ─── Debounce ─────────────────────────────────────
        function debounce(fn, ms = 300) {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
        }

        // ─── Get current month range ──────────────────────
        function currentMonthRange() {
            const now = new Date();
            const y = now.getFullYear(), m = now.getMonth();
            const from = new Date(y, m, 1).toISOString().slice(0, 10);
            const to = new Date(y, m + 1, 0).toISOString().slice(0, 10);
            return { from, to };
        }

        // ─── Sort deliveries by date ───────────────────────
        function sortByDate(arr) {
            return [...arr].sort((a, b) => (a.ngay > b.ngay ? 1 : -1));
        }

        // ─── Group deliveries by license plate ────────────
        function groupByPlate(deliveries) {
            const groups = {};
            sortByDate(deliveries).forEach(d => {
                if (!groups[d.bienSoXe]) groups[d.bienSoXe] = [];
                groups[d.bienSoXe].push(d);
            });
            return groups;
        }

        // ─── Calculate totals ─────────────────────────────
        function calcTotals(deliveries) {
            let tongChuyến = 0, tongKL = 0;
            deliveries.forEach(d => {
                const scc = parseFloat(d.soChuyenCho) || 1;
                const kl = parseFloat(d.khoiLuong) || 0;
                tongChuyến += scc;
                tongKL += kl * scc;
            });
            return { tongChuyến, tongKL };
        }

        // ─── Toast ────────────────────────────────────────
        function showToast(msg, type = 'info', duration = 3000) {
            const container = document.getElementById('toast-container');
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${esc(msg)}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // ─── Loading ──────────────────────────────────────
        function showLoading(text = 'Đang xử lý...') {
            const el = document.getElementById('loading-overlay');
            el.querySelector('.loading-text').textContent = text;
            el.classList.add('active');
        }
        function hideLoading() {
            document.getElementById('loading-overlay').classList.remove('active');
        }

        // ─── Confirm Dialog ───────────────────────────────
        function confirmDialog(msg, onConfirm) {
            if (window.confirm(msg)) onConfirm();
        }

        // ─── Clean Vietnamese Accents ──────────────────────
        function cleanVietnamese(str) {
            if (!str) return '';
            return str.toString()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .replace(/Đ/g, "D")
                .toLowerCase();
        }

        // ─── Initialize Custom Searchable Dropdown ────────
        function makeSearchableDropdown(select) {
            if (!select) return;
            if (select.dataset.searchable) return;
            select.dataset.searchable = "true";

            // Hide the original select
            select.style.display = "none";

            // Create wrapper
            const wrapper = document.createElement("div");
            wrapper.className = "searchable-dropdown";
            select.parentNode.insertBefore(wrapper, select);
            wrapper.appendChild(select); // Move select inside wrapper

            // Create trigger
            const trigger = document.createElement("div");
            trigger.className = "dropdown-trigger";
            const triggerText = document.createElement("span");
            triggerText.className = "selected-text";
            trigger.appendChild(triggerText);
            const triggerArrow = document.createElement("span");
            triggerArrow.className = "dropdown-arrow";
            triggerArrow.textContent = "▼";
            trigger.appendChild(triggerArrow);
            wrapper.appendChild(trigger);

            // Create menu
            const menu = document.createElement("div");
            menu.className = "dropdown-menu hidden";

            // Search input
            const searchInput = document.createElement("input");
            searchInput.type = "text";
            searchInput.className = "dropdown-search-input";
            searchInput.placeholder = "Gõ tìm kiếm (Fuzzy search)...";
            menu.appendChild(searchInput);

            // Options container
            const optionsList = document.createElement("div");
            optionsList.className = "dropdown-options-list";
            menu.appendChild(optionsList);
            wrapper.appendChild(menu);

            // Update trigger text based on selected option
            function updateTriggerText() {
                const selectedOpt = select.options[select.selectedIndex];
                triggerText.textContent = selectedOpt ? selectedOpt.textContent : (select.placeholder || "-- Chọn --");
            }

            // Build option list in custom dropdown
            function buildOptions(filter = "") {
                optionsList.innerHTML = "";

                // Clean the filter for relative search
                const cleanFilter = cleanVietnamese(filter);
                const filterWords = cleanFilter.split(/\s+/).filter(Boolean);

                Array.from(select.options).forEach((opt, idx) => {
                    const label = opt.textContent;
                    const cleanLabel = cleanVietnamese(label);

                    // Fuzzy matching: check if all words in filter exist in label
                    const matches = filterWords.every(word => cleanLabel.includes(word));
                    if (filter && !matches) {
                        return; // skip if not matches
                    }

                    const optDiv = document.createElement("div");
                    optDiv.className = `dropdown-option ${opt.selected ? "selected" : ""}`;
                    optDiv.textContent = label;
                    optDiv.dataset.value = opt.value;
                    optDiv.dataset.index = idx;

                    optDiv.addEventListener("click", () => {
                        select.selectedIndex = idx;
                        updateTriggerText();

                        // Mark as selected in custom list
                        optionsList.querySelectorAll(".dropdown-option").forEach(el => el.classList.remove("selected"));
                        optDiv.classList.add("selected");

                        // Close menu
                        menu.classList.add("hidden");
                        trigger.classList.remove("open");

                        // Trigger change event on original select
                        select.dispatchEvent(new Event("change"));
                    });

                    optionsList.appendChild(optDiv);
                });
            }

            // Trigger open/close
            trigger.addEventListener("click", (e) => {
                e.stopPropagation();
                const isOpen = !menu.classList.contains("hidden");
                // Close other dropdowns first
                document.querySelectorAll(".dropdown-menu").forEach(el => el.classList.add("hidden"));
                document.querySelectorAll(".dropdown-trigger").forEach(el => el.classList.remove("open"));

                if (!isOpen) {
                    menu.classList.remove("hidden");
                    trigger.classList.add("open");
                    searchInput.value = "";
                    buildOptions();
                    searchInput.focus();
                }
            });

            // Filter on typing
            searchInput.addEventListener("input", (e) => {
                buildOptions(e.target.value);
            });

            // Close menu when clicking outside
            document.addEventListener("click", (e) => {

    <script>
        // =====================================================
        //  js/db.js - Google Sheets Database Layer
        // =====================================================

        const DB = {
            apiUrl: '',

            // ─── Init ────────────────────────────────────────
            setUrl(url) { this.apiUrl = url; },

            async _call(params) {
                // Nếu chạy trực tiếp trên Google Apps Script, dùng google.script.run
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    return new Promise((resolve, reject) => {
                        google.script.run
                            .withSuccessHandler(res => {
                                if (res.success) {
                                    resolve(res.data);
                                } else {
                                    reject(new Error(res.error || 'Lỗi không xác định'));
                                }
                            })
                            .withFailureHandler(err => reject(new Error(err.message || err)))
                            .apiHandler(params);
                    });
                }

                // Ngược lại, chạy bằng fetch (offline/local)
                if (!this.apiUrl) throw new Error('Chưa cấu hình API URL. Vào Cài đặt để nhập URL Google Apps Script.');
                const res = await fetch(this.apiUrl, {
                    method: 'POST',
                    body: JSON.stringify(params),
                    headers: { 'Content-Type': 'text/plain' }
                });
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); } catch (e) { throw new Error('Lỗi phản hồi từ server: ' + text.slice(0, 100)); }
                if (!data.success) throw new Error(data.error || 'Lỗi không xác định');
                return data.data;
            },


            // ─── Database Init ────────────────────────────────
            async initDB() {
                return await this._call({ action: 'init' });
            },

            // ─── Company Config ───────────────────────────────
            async getConfig() {
                const rows = await this._call({ action: 'read', sheet: 'CauHinh' });
                const cfg = {};
                rows.forEach(r => { cfg[r.key] = r.value; });
                return cfg;
            },
            async saveConfig(cfg) {
                // Read existing keys then update each
                const rows = await this._call({ action: 'read', sheet: 'CauHinh' });
                const existing = {};
                rows.forEach(r => { existing[r.key] = true; });
                for (const [key, value] of Object.entries(cfg)) {
                    if (existing[key]) {
                        await this._call({ action: 'update', sheet: 'CauHinh', id: key, data: { key, value } });
                    } else {
                        await this._call({ action: 'create', sheet: 'CauHinh', data: { key, value } });
                    }
                }
            },

            // ─── Customers ───────────────────────────────────
            async getCustomers() {
                return await this._call({ action: 'read', sheet: 'KhachHang' });
            },
            async createCustomer(data) {
                data.id = data.id || genId();
                return await this._call({ action: 'create', sheet: 'KhachHang', data });
            },
            async updateCustomer(id, data) {
                return await this._call({ action: 'update', sheet: 'KhachHang', id, data });
            },
            async deleteCustomer(id) {
                return await this._call({ action: 'delete', sheet: 'KhachHang', id });
            },

            // ─── Products ────────────────────────────────────
            async getProducts() {
                return await this._call({ action: 'read', sheet: 'SanPham' });
            },
            async createProduct(data) {
                data.id = data.id || genId();
                return await this._call({ action: 'create', sheet: 'SanPham', data });
            },
            async updateProduct(id, data) {
                return await this._call({ action: 'update', sheet: 'SanPham', id, data });
            },
            async deleteProduct(id) {
                return await this._call({ action: 'delete', sheet: 'SanPham', id });
            },

            // ─── Deliveries ──────────────────────────────────
            async getDeliveries() {
                return await this._call({ action: 'read', sheet: 'VanChuyen' });
            },
            async createDelivery(data) {
                data.id = data.id || genId();
                return await this._call({ action: 'create', sheet: 'VanChuyen', data });
            },
            async updateDelivery(id, data) {
                return await this._call({ action: 'update', sheet: 'VanChuyen', id, data });
            },
            async deleteDelivery(id) {
                return await this._call({ action: 'delete', sheet: 'VanChuyen', id });
            },

            // ─── Local Cache ─────────────────────────────────
            cache: { customers: null, products: null, deliveries: null, config: null },

            async loadAll() {
                const [customers, products, deliveries, config] = await Promise.all([
                    this.getCustomers(),
                    this.getProducts(),
                    this.getDeliveries(),
                    this.getConfig()
                ]);
                this.cache.customers = customers;
                this.cache.products = products;
                this.cache.deliveries = deliveries;
                this.cache.config = config;
                return { customers, products, deliveries, config };
            }
        };

    </script>

                    tongTatCaChuyến += subtotalChuyến; tongTatCaKL += subtotalKL;
                    tongTatCaKLChuyen += subtotalKLChuyen;
                    rows += `<tr style="font-weight:bold;background:#e8f0fe;">
        <td colspan="5" class="text-right">Cộng</td>
        <td class="text-center">${subtotalChuyến}</td>
        <td class="text-right">${fmtNum(subtotalKLChuyen)}</td>
        <td class="text-right">${fmtNum(subtotalKL)}</td>
      </tr>`;
                }

                return `<div class="doc-a4">
      <div style="text-align:left; margin-bottom:16px; font-weight:bold; font-size:11pt; text-transform:uppercase;">
        ${esc(company.tenCongTy || '')}
      </div>
      <div class="doc-title">BẢNG KÊ CHI TIẾT PHIẾU NHẬP VẬT LIỆU</div>
      <div class="doc-center" style="margin-bottom:6px; font-size:11pt; color:red; font-weight:bold;">
        Từ ngày ${formatDate(dateFrom)} đến ngày ${formatDate(dateTo)}
      </div>
      <div class="doc-center" style="margin-bottom:12px; font-size:11pt; font-weight:bold; text-transform:uppercase;">
        TÊN VẬT LIỆU: ${esc(product.ten || 'Đá cấp phối 375')}
      </div>
      <table>
        <tr>
          <th style="width:5%;">TT</th>
          <th style="width:12%;">Số phiếu (Ngày)</th>
          <th style="width:14%;">Biển số xe</th>
          <th>Tên hàng hóa</th>
          <th style="width:6%;">ĐVT</th>
          <th style="width:10%;">Số chuyến</th>
          <th style="width:12%;">KL/chuyến (m3)</th>
          <th style="width:12%;">T.KL (m3)</th>
        </tr>
        ${rows}
        <tr style="font-weight:bold;background:#c7d7fd;">
          <td colspan="5" class="text-right">TỔNG CỘNG</td>
          <td class="text-center">${tongTatCaChuyến}</td>
          <td class="text-right">${fmtNum(tongTatCaKLChuyen)}</td>
          <td class="text-right">${fmtNum(tongTatCaKL)}</td>
        </tr>
      </table>
      <div style="margin-top:8px;font-style:italic;font-size:10pt;text-align:right;">Hôm nay là ngày ${currentDay(form.ngayLap)} tháng ${currentMonth(form.ngayLap)} năm ${currentYear(form.ngayLap)}</div>
      <div class="doc-sig-row">
        <div class="doc-sig">
          <div class="doc-sig-title" style="font-size:14pt; font-weight:bold;">ĐẠI DIỆN BÊN MUA</div>
          <div style="font-style:italic;font-size:10pt;">(Ký, ghi rõ họ tên)</div>
          <div class="doc-sig-space"></div>
        </div>
        <div class="doc-sig">
          <div class="doc-sig-title" style="font-size:14pt; font-weight:bold;">ĐẠI DIỆN BÊN BÁN</div>
          <div style="font-style:italic;font-size:10pt;">(Ký, đóng dấu, ghi rõ họ tên)</div>
          <div class="doc-sig-space"></div>
        </div>
      </div>
    </div>`;
            }
        };

    </script>
    <script>
        // =====================================================
        //  js/app.js - Main Application Logic
        // =====================================================

        // ─── Global State ────────────────────────────────────
        const State = {
            page: 'vanchuyen',
            customers: [],
            products: [],
            deliveries: [],
            config: {},
            filters: {
                deliv: { dateFrom: '', dateTo: '', khachHangId: '', bienSoXe: '' }
            },
            doc: {
                khachHangId: '', sanPhamId: '', dateFrom: '', dateTo: '',
                // soHopDong: '', soBBGT: '', soBBKL: '', soDDH: '', soPhieu: '',
                soHopDong: '', soDDH: '', soPhieu: '',
                congTrinh: '', diaChiCongTrinh: '', ngayLap: '', donGiaDa: '', donGiaVC: '',
                duNoDauKy: 0, daTra: 0, tongKL: 0
            },
            activeDoc: 0   // 0-5 for the 6 documents
        };

        // ─── Init ─────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', async () => {
            initNav();
            initDateDefaults();
            loadApiUrl();

            const url = localStorage.getItem('tqc_api_url');
            if (url) {
                DB.setUrl(url);
                await loadAllData();
            } else {
                renderDeliveries();
                showPage('vanchuyen');
            }
        });

        // ─── Utilities ────────────────────────────────────────
        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        const debouncedRenderCustomers = debounce(val => renderCustomers(val), 300);
        const debouncedRenderDeliveries = debounce(() => renderDeliveries(), 300);

        function loadApiUrl() {
            const url = localStorage.getItem('tqc_api_url') || '';
            const inp = document.getElementById('api-url-input');
            if (inp) inp.value = url;
            if (!url) {
                document.querySelectorAll('.api-required').forEach(el => el.classList.add('hidden'));
                document.getElementById('api-banner')?.classList.remove('hidden');
            }
        }

        function initDateDefaults() {
            const range = currentMonthRange();
            State.filters.deliv.dateFrom = range.from;
            State.filters.deliv.dateTo = range.to;
            State.doc.dateFrom = range.from;
            State.doc.dateTo = range.to;
            State.doc.ngayLap = todayISO();
        }

        // ─── Navigation ──────────────────────────────────────
        function initNav() {
            document.querySelectorAll('.nav-item').forEach(el => {
                el.addEventListener('click', () => {
                    const page = el.dataset.page;
                    if (page) navigateTo(page);
                });
            });
        }

        function setTopbarHeader(title, subtitle) {
            document.querySelector('.topbar-title').textContent = title;
            const sub = document.querySelector('.topbar-subtitle');
            if (sub) sub.textContent = subtitle || '';
        }

        function navigateTo(page) {
            State.page = page;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
            document.querySelectorAll('.page').forEach(el => el.classList.toggle('active', el.id === 'page-' + page));

            switch (page) {
                case 'khachhang': renderCustomers(); break;
                case 'vanchuyen': renderDeliveries(); break;
                case 'sanpham': renderProducts(); break;
                case 'giayto': renderDocPage(); break;
                case 'congty': renderCompanyInfoPage(); break;
                case 'danhsachxe': renderVehicleListPage(); break;
                case 'caidat': renderSettings(); break;
            }
        }

        const pageTitles = {
            khachhang: 'Quản lý Khách hàng',
            vanchuyen: 'Quản lý Vận chuyển',
            sanpham: 'Danh mục Sản phẩm',
            giayto: 'Tạo Giấy tờ',
            congty: 'Thông tin công ty TQC',
            danhsachxe: 'Danh sách xe',
            caidat: 'Cài đặt hệ thống'
        };

        // ─── Load Data ───────────────────────────────────────
        async function loadAllData() {
            showLoading('Đang tải dữ liệu...');
            try {
                const data = await DB.loadAll();
                State.customers = data.customers || [];
                State.products = data.products || [];
                State.deliveries = data.deliveries || [];
                State.config = data.config || {};
                renderDeliveries();
                showPage('vanchuyen');
                showToast('Tải dữ liệu thành công', 'success');
            } catch (e) {
                showToast('Lỗi tải dữ liệu: ' + e.message, 'error', 5000);
                renderDeliveries();
                showPage('vanchuyen');
            } finally {
                hideLoading();
            }
        }

        function showPage(page) {
            navigateTo(page);
        }

        // ─── CUSTOMERS PAGE ───────────────────────────────────
        function renderCustomers(search = '') {
            const filtered = State.customers.filter(c =>
                !search || c.tenCongTy?.toLowerCase().includes(search.toLowerCase()) ||
                c.daiDien?.toLowerCase().includes(search.toLowerCase()) ||
                c.maSoThue?.includes(search)
            );

            const rows = filtered.map((c, idx) => `
    <tr>
      <td style="width: 50px; text-align: center;">${idx + 1}</td>
      <td><div class="fw-semibold">${esc(c.tenCongTy)}</div><div class="text-muted" style="font-size:0.72rem;">${esc(c.diaChi || '')}</div></td>
      <td>${esc(c.daiDien || '')}</td>
      <td>${esc(c.chucVu || '')}</td>
      <td><span class="badge badge-blue">${esc(c.maSoThue || '')}</span></td>
      <td><span class="badge badge-yellow">${esc(c.soHopDong || '')}</span></td>
      <td class="td-actions">
        <button class="btn btn-sm btn-outline" onclick="openCustomerModal('${c.id}')">✏️ Sửa</button>
        <button class="btn btn-sm btn-danger" onclick="deleteCustomer('${c.id}')">🗑️</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">👥</div><h3>Chưa có khách hàng</h3><p>Thêm khách hàng đầu tiên</p></div></td></tr>`;

            setTopbarHeader('Quản lý Khách hàng', `${State.customers.length} đối tác`);
            document.getElementById('page-khachhang').innerHTML = `
    <div class="page-header">
      <div style="margin-left: auto; display: flex; gap: 8px;">
        <button class="btn btn-success" onclick="exportTabToExcel('khachhang')">📥 Xuất Excel</button>
        <button class="btn btn-primary" onclick="openCustomerModal()">➕ Thêm khách hàng</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="toolbar" style="margin:0;">
          <div class="search-box"><span class="search-icon">🔍</span><input type="text" placeholder="Tìm theo tên, MST..." id="kh-search" value="${esc(search)}" oninput="debouncedRenderCustomers(this.value)"></div>
          <span class="text-muted" style="font-size:0.78rem;">${filtered.length} kết quả</span>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th style="width: 50px; text-align: center;">STT</th><th>Tên công ty</th><th>Đại diện</th><th>Chức vụ</th><th>Mã số thuế</th><th>Số HĐ</th><th>Thao tác</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
        }

        function openCustomerModal(id = null) {
            const c = id ? State.customers.find(x => x.id === id) : {};
            const isEdit = !!id;

            document.getElementById('modal-title').textContent = isEdit ? 'Sửa khách hàng' : 'Thêm khách hàng';
            document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label class="form-label">Tên công ty <span class="required">*</span></label>
      <input class="form-control" id="kh-tenCongTy" value="${esc(c.tenCongTy || '')}" placeholder="CÔNG TY TNHH..."></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Đại diện bên mua</label>
        <input class="form-control" id="kh-daiDien" value="${esc(c.daiDien || '')}" placeholder="Nguyễn Văn A"></div>
      <div class="form-group"><label class="form-label">Chức vụ</label>
        <input class="form-control" id="kh-chucVu" value="${esc(c.chucVu || '')}" placeholder="Giám đốc"></div>
    </div>
    <div class="form-group"><label class="form-label">Địa chỉ</label>
      <input class="form-control" id="kh-diaChi" value="${esc(c.diaChi || '')}" placeholder="Số nhà, đường, phường, quận, tỉnh/thành"></div>
    <div class="form-group"><label class="form-label">Mã số thuế</label>
      <input class="form-control" id="kh-maSoThue" value="${esc(c.maSoThue || '')}" placeholder="0400000000"></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Số HĐ / Số phiếu DNTT</label>
        <input class="form-control" id="kh-soHopDong" value="${esc(c.soHopDong || '')}" placeholder="..../HĐ"></div>
      <div class="form-group"><label class="form-label">Công trình</label>
        <input class="form-control" id="kh-congTrinh" value="${esc(c.congTrinh || '')}" placeholder="Tên công trình..."></div>
    </div>
    <div class="form-group"><label class="form-label">Địa chỉ công trình</label>
      <input class="form-control" id="kh-diaChiCongTrinh" value="${esc(c.diaChiCongTrinh || '')}" placeholder="Địa chỉ công trình..."></div>
    
    


    <div class="form-grid">
      <div class="form-group"><label class="form-label">Hợp đồng nguyên tắc số</label>
        <input class="form-control" id="kh-hdNguyenTacSo" value="${esc(c.hdNguyenTacSo || '')}" placeholder="HĐNT số..."></div>
      <div class="form-group"><label class="form-label">Ngày ký HĐ</label>
        <input type="date" class="form-control" id="kh-ngayKyHD" value="${c.ngayKyHD || ''}"></div>
    </div>
    <div class="form-grid-3">
      <div class="form-group"><label class="form-label">Hóa đơn số</label>
        <input class="form-control" id="kh-hoaDonSo" value="${esc(c.hoaDonSo || '')}" placeholder="Hóa đơn số..."></div>
      <div class="form-group"><label class="form-label">Ký hiệu hóa đơn</label>
        <input class="form-control" id="kh-kyHieuHoaDon" value="${esc(c.kyHieuHoaDon || '')}" placeholder="Ký hiệu..."></div>
      <div class="form-group"><label class="form-label">Ngày ký hóa đơn</label>
        <input type="date" class="form-control" id="kh-ngayKyHoaDon" value="${c.ngayKyHoaDon || ''}"></div>
    </div>`;

            document.getElementById('modal-save').onclick = () => saveCustomer(id);
            openModal();
        }

        async function saveCustomer(id) {
            const data = {
                id: id || genId(),
                tenCongTy: document.getElementById('kh-tenCongTy').value.trim(),
                daiDien: document.getElementById('kh-daiDien').value.trim(),
                chucVu: document.getElementById('kh-chucVu').value.trim(),
                diaChi: document.getElementById('kh-diaChi').value.trim(),
                maSoThue: document.getElementById('kh-maSoThue').value.trim(),
                soHopDong: document.getElementById('kh-soHopDong').value.trim(),
                congTrinh: document.getElementById('kh-congTrinh').value.trim(),
                diaChiCongTrinh: document.getElementById('kh-diaChiCongTrinh').value.trim(),
                //soBBGT: document.getElementById('kh-soBBGT').value.trim(),
                //soBBKL: document.getElementById('kh-soBBKL').value.trim(),
                hdNguyenTacSo: document.getElementById('kh-hdNguyenTacSo').value.trim(),
                ngayKyHD: document.getElementById('kh-ngayKyHD').value,
                hoaDonSo: document.getElementById('kh-hoaDonSo').value.trim(),
                kyHieuHoaDon: document.getElementById('kh-kyHieuHoaDon').value.trim(),
                ngayKyHoaDon: document.getElementById('kh-ngayKyHoaDon').value,
            };
            if (!data.tenCongTy) { showToast('Vui lòng nhập tên công ty', 'error'); return; }

            showLoading('Đang lưu...');
            try {
                if (id) {
                    await DB.updateCustomer(id, data);
                    const idx = State.customers.findIndex(c => c.id === id);
                    if (idx >= 0) State.customers[idx] = data;
                    showToast('Đã cập nhật khách hàng', 'success');
                } else {
                    await DB.createCustomer(data);
                    State.customers.push(data);
                    showToast('Đã thêm khách hàng', 'success');
                }
                closeModal();
                renderCustomers();
            } catch (e) {
                showToast('Lỗi: ' + e.message, 'error');
            } finally { hideLoading(); }
        }

        async function deleteCustomer(id) {
            confirmDialog('Xóa khách hàng này?', async () => {
                showLoading('Đang xóa...');
                try {
                    await DB.deleteCustomer(id);
                    State.customers = State.customers.filter(c => c.id !== id);
                    showToast('Đã xóa khách hàng', 'success');
                    renderCustomers();
                } catch (e) { showToast('Lỗi: ' + e.message, 'error'); }
                finally { hideLoading(); }
            });
        }

        // ─── DELIVERIES PAGE ──────────────────────────────────
        function renderDeliveries() {
            const f = State.filters.deliv;
            let delivs = [...State.deliveries];
            if (f.dateFrom) delivs = delivs.filter(d => d.ngay >= f.dateFrom);
            if (f.dateTo) delivs = delivs.filter(d => d.ngay <= f.dateTo);
            if (f.khachHangId) delivs = delivs.filter(d => d.khachHangId === f.khachHangId);
            if (f.bienSoXe) delivs = delivs.filter(d => d.bienSoXe?.toLowerCase().includes(f.bienSoXe.toLowerCase()));
            delivs = sortByDate(delivs).reverse();

            const { tongChuyến, tongKL } = calcTotals(delivs);
            const khOptions = State.customers.map(c => `<option value="${c.id}" ${f.khachHangId === c.id ? 'selected' : ''}>${esc(c.tenCongTy)}</option>`).join('');
            const spMap = Object.fromEntries(State.products.map(p => [p.id, p]));
            const khMap = Object.fromEntries(State.customers.map(c => [c.id, c]));

            const rows = delivs.map(d => {
                const kh = khMap[d.khachHangId];
                const sp = spMap[d.sanPhamId];
                const tKL = (parseFloat(d.soChuyenCho) || 1) * (parseFloat(d.khoiLuong) || 0);
                return `<tr>
      <td class="font-num">${formatDate(d.ngay)}</td>
      <td><span class="badge badge-blue">${esc(d.bienSoXe)}</span></td>
      <td class="text-center">${d.soChuyenCho}</td>
      <td class="text-right font-num">${fmtNum(d.khoiLuong)}</td>
      <td class="text-right font-num fw-semibold">${fmtNum(tKL)}</td>
      <td><span class="text-muted" style="font-size:0.75rem;">${esc(kh?.tenCongTy || '')}</span></td>
      <td><span class="badge badge-green">${esc(sp?.ten || '')}</span></td>
      <td>${esc(d.ghiChu || '')}</td>
      <td class="td-actions">
        <button class="btn btn-sm btn-outline" onclick="openDelivModal('${d.id}')">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="deleteDelivery('${d.id}')">🗑️</button>
      </td>
    </tr>`;
            }).join('') || `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">🚛</div><h3>Không có dữ liệu</h3><p>Thêm chuyến xe đầu tiên hoặc thay đổi bộ lọc</p></div></td></tr>`;

            setTopbarHeader('Quản lý Vận chuyển', `${State.deliveries.length} bản ghi tổng cộng`);
            document.getElementById('page-vanchuyen').innerHTML = `
    <div class="page-header">
      <div style="margin-left: auto; display: flex; gap: 8px;">
        <button class="btn btn-success" onclick="exportTabToExcel('vanchuyen')">📥 Xuất Excel</button>
        <button class="btn btn-primary" onclick="openDelivModal()">➕ Thêm chuyến xe</button>
      </div>
    </div>
    <div class="filter-card">
      <div class="filter-grid">
        <div class="form-group" style="margin:0;"><label class="form-label">Từ ngày</label>
          <input type="date" class="form-control" value="${f.dateFrom}" onchange="State.filters.deliv.dateFrom=this.value;renderDeliveries()"></div>
        <div class="form-group" style="margin:0;"><label class="form-label">Đến ngày</label>
          <input type="date" class="form-control" value="${f.dateTo}" onchange="State.filters.deliv.dateTo=this.value;renderDeliveries()"></div>
        <div class="form-group" style="margin:0;"><label class="form-label">Khách hàng</label>
          <select class="form-control" id="filter-deliv-kh" onchange="State.filters.deliv.khachHangId=this.value;renderDeliveries()">
            <option value="">-- Tất cả --</option>${khOptions}</select></div>
        <div class="form-group" style="margin:0;"><label class="form-label">Biển số xe</label>
          <input type="text" class="form-control" placeholder="92H-..." value="${f.bienSoXe || ''}" oninput="State.filters.deliv.bienSoXe=this.value; debouncedRenderDeliveries()"></div>
        <div style="display:flex;align-items:flex-end;">
          <button class="btn btn-secondary w-full" onclick="State.filters.deliv={dateFrom:'',dateTo:'',khachHangId:'',bienSoXe:''};renderDeliveries()">🔄 Xóa lọc</button>
        </div>
      </div>
    </div>
    <div class="summary-row">
      <div class="summary-item">Tổng bản ghi: <strong>${delivs.length}</strong></div>
      <div class="summary-item">Tổng chuyến: <strong>${tongChuyến}</strong></div>
      <div class="summary-item">Tổng khối lượng: <strong>${fmtNum(tongKL)} m³</strong></div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Ngày</th><th>Biển số</th><th class="text-center">Số chuyến</th><th class="text-right">KL/chuyến (m³)</th><th class="text-right">T.KL (m³)</th><th>Khách hàng</th><th>Sản phẩm</th><th>Ghi chú</th><th>Thao tác</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
            makeSearchableDropdown(document.getElementById('filter-deliv-kh'));
        }

        function openDelivModal(id = null) {
            const d = id ? State.deliveries.find(x => x.id === id) : {};
            const isEdit = !!id;
            const khOptions = State.customers.map(c => `<option value="${c.id}" ${d.khachHangId === c.id ? 'selected' : ''}>${esc(c.tenCongTy)}</option>`).join('');
            const spOptions = State.products.map(p => `<option value="${p.id}" ${d.sanPhamId === p.id ? 'selected' : ''}>${esc(p.ten)}</option>`).join('');

            // Parse license plates
            let plates = [];
            if (State.config.bienSoXeList) {
                plates = State.config.bienSoXeList.split(/[\n,]+/).map(s => s.trim().toUpperCase()).filter(Boolean);
            }
            // Fallback to existing unique plates if settings list is empty
            if (plates.length === 0) {
                const uniquePlates = new Set(State.deliveries.map(x => x.bienSoXe?.toUpperCase()).filter(Boolean));
                plates = Array.from(uniquePlates).sort();
            }

            const plateOptions = plates.map(p => `<option value="${p}" ${d.bienSoXe === p ? 'selected' : ''}>${p}</option>`).join('');

            document.getElementById('modal-title').textContent = isEdit ? 'Sửa chuyến xe' : 'Thêm chuyến xe';
            document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Ngày <span class="required">*</span></label>
        <input type="date" class="form-control" id="d-ngay" value="${d.ngay || todayISO()}"></div>
      <div class="form-group"><label class="form-label">Biển số xe <span class="required">*</span></label>
        <select class="form-control" id="d-bienSoXe">
          <option value="">-- Chọn biển số --</option>
          ${plateOptions}
        </select>
      </div>
    </div>

            const el = document.getElementById('d-tong');

        async function saveDelivery(id) {
            const data = {
                id: id || genId(),
                ngay: document.getElementById('d-ngay').value,
                bienSoXe: document.getElementById('d-bienSoXe').value.trim().toUpperCase(),
                soChuyenCho: parseFloat(document.getElementById('d-soChuyenCho').value) || 1,
                khoiLuong: parseFloat(document.getElementById('d-khoiLuong').value) || 0,
                khachHangId: document.getElementById('d-khachHangId').value,
                sanPhamId: document.getElementById('d-sanPhamId').value,
                ghiChu: document.getElementById('d-ghiChu').value.trim(),
            };
            if (!data.ngay || !data.bienSoXe || !data.khachHangId || !data.sanPhamId) {
                showToast('Vui lòng điền đầy đủ thông tin bắt buộc', 'error'); return;
            }
            if (data.khoiLuong <= 0) {
                showToast('Khối lượng/chuyến phải lớn hơn 0', 'error'); return;
            }

            showLoading('Đang lưu...');
            try {
                if (id) {
                    await DB.updateDelivery(id, data);
                    const idx = State.deliveries.findIndex(d => d.id === id);
                    if (idx >= 0) State.deliveries[idx] = data;
                    showToast('Đã cập nhật chuyến xe', 'success');
                } else {
                    await DB.createDelivery(data);
                    State.deliveries.push(data);
                    showToast('Đã thêm chuyến xe', 'success');
                }
                closeModal();
                renderDeliveries();
            } catch (e) { showToast('Lỗi: ' + e.message, 'error'); }
            finally { hideLoading(); }
        }

        async function deleteDelivery(id) {
            confirmDialog('Xóa chuyến xe này?', async () => {
                showLoading('Đang xóa...');
                try {
                    await DB.deleteDelivery(id);
                    State.deliveries = State.deliveries.filter(d => d.id !== id);
                    showToast('Đã xóa', 'success');
                    renderDeliveries();
                } catch (e) { showToast('Lỗi: ' + e.message, 'error'); }
                finally { hideLoading(); }
            });
        }

        function getDocDeliveries() {
            return State.deliveries.filter(d => {
                if (State.doc.khachHangId && d.khachHangId !== State.doc.khachHangId) return false;
                if (State.doc.sanPhamId && d.sanPhamId !== State.doc.sanPhamId) return false;
                if (State.doc.dateFrom && d.ngay < State.doc.dateFrom) return false;
                if (State.doc.dateTo && d.ngay > State.doc.dateTo) return false;
                return true;
            });
        }

            const delivs = getDocDeliveries();

                hoaDonSo: kh.hoaDonSo || '',

        function exportCurrentDoc() {
            const params = getDocParams();
            if (!params.customer.id && State.activeDoc !== 5) {
                showToast('Vui lòng chọn khách hàng trước khi xuất', 'error'); return;

            const docInfo = DOC_LIST[State.activeDoc];
            exportToExcel([{ key: docInfo.key, name: docInfo.sheet, params }]);

        function exportAllDocs() {
            const params = getDocParams();

        // --- Helper function to create clean, URL-safe filenames ---
        function formatFilename(str) {
            if (!str) return "Khach_Hang";
            return str.normalize("NFD") // Decompose accents
                .replace(/[\u0300-\u036f]/g, "") // Remove accents
                .replace(/đ/g, "d").replace(/Đ/g, "D") // Convert 'Đ'
                .replace(/[^a-zA-Z0-9]/g, "_") // Replace spaces & special chars with underscores
                .replace(/_+/g, "_") // Remove consecutive duplicate underscores
                .replace(/^_|_$/g, ""); // Trim underscores from the start and end
        }

                if (f.dateFrom) filteredData = filteredData.filter(d => d.ngay >= f.dateFrom);
                if (f.dateTo) filteredData = filteredData.filter(d => d.ngay <= f.dateTo);
                if (f.khachHangId) filteredData = filteredData.filter(d => d.khachHangId === f.khachHangId);
                if (f.bienSoXe) filteredData = filteredData.filter(d => d.bienSoXe?.toLowerCase().includes(f.bienSoXe.toLowerCase()));

                // Sort by date desc
                filteredData.sort((a, b) => (b.ngay || '').localeCompare(a.ngay || ''));

                const spMap = Object.fromEntries((State.products || []).map(p => [p.id, p]));
                const khMap = Object.fromEntries((State.customers || []).map(c => [c.id, c]));

                filteredData.forEach((d, i) => {
                    const kh = khMap[d.khachHangId];
                    const sp = spMap[d.sanPhamId];

                        tKL,
                        kh?.tenCongTy || '',
                        sp?.ten || '',
                        d.ghiChu || ''
                    ]);
                });
            }

            if (data.length <= 1) {
                showToast('Không có dữ liệu để xuất', 'warning');
                return;
            }

            const ws = XLSX.utils.aoa_to_sheet(data);
            ws['!cols'] = cols;

            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let R = range.s.r; R <= range.e.r; ++R) {
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const cell_address = { c: C, r: R };
                    const cell_ref = XLSX.utils.encode_cell(cell_address);
                    if (!ws[cell_ref]) continue;

                    let isHeader = (R === 0);

                    ws[cell_ref].s = {
                        font: {
                            name: 'Times New Roman',
                            sz: 12,
                            bold: isHeader
                        },
                        border: {
                            top: { style: 'thin', color: { auto: 1 } },
                            bottom: { style: 'thin', color: { auto: 1 } },
                            left: { style: 'thin', color: { auto: 1 } },
                            right: { style: 'thin', color: { auto: 1 } }
                        },
                        alignment: {
                            vertical: 'center',
                            horizontal: isHeader ? 'center' : (typeof ws[cell_ref].v === 'number' ? 'right' : 'left'),
                            wrapText: true
                        }
                    };

                    if (isHeader) {
                        ws[cell_ref].s.fill = {
                            patternType: 'solid',
                            fgColor: { rgb: 'FFDDEBF7' }
                        };
                    } else if (typeof ws[cell_ref].v === 'number') {
                        if (tabType === 'sanpham' && (C === 3 || C === 4)) {
                            ws[cell_ref].z = '#,##0';
                        } else if (tabType === 'vanchuyen' && C === 3) {
                            ws[cell_ref].z = '#,##0';
                        } else if (tabType === 'vanchuyen' && (C === 4 || C === 5)) {
                            ws[cell_ref].z = '#,##0.00';
                        }
                    }
                }
            }

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            XLSX.writeFile(wb, fileName);
            showToast('Đã xuất file Excel thành công!', 'success');
        }

        function exportToExcel(sheets) {
            if (typeof XLSX === 'undefined') {
                alert('❌ Thư viện Excel chưa được tải xong. Hãy kiểm tra kết nối mạng hoặc thử lại sau vài giây.');
                return;
            }

            const wb = XLSX.utils.book_new();

            // Catch errors on a per-sheet basis
            sheets.forEach(({ key, name, params }) => {
                try {
                    const ws = buildWorksheet(key, params);
                    XLSX.utils.book_append_sheet(wb, ws, name);
                } catch (err) {
                    console.error(`Lỗi tại sheet ${name}:`, err);
                    throw new Error(`Xảy ra lỗi khi tạo sheet "${name}": ` + err.message);
                }
            });

            // --- NEW FILENAME LOGIC ---

            // 1. Get raw customer name and format it (Remove the slice so the full name is kept)
            const rawKhName = sheets[0].params.customer?.tenCongTy || 'TQC';
            const cleanKhName = formatFilename(rawKhName);

            // 2. Format the date from YYYY-MM-DD to YYYYMMDD for a cleaner look
            const rawDate = sheets[0].params.form.ngayLap || todayISO();
            const cleanDate = rawDate.replace(/-/g, "");

            // 3. Differentiate between Single Export and All Export
            let docType = "";
            if (sheets.length === 1) {
                // If it's a single sheet, use its key in uppercase (e.g., 'DNTT', 'GT', 'KL')
                docType = sheets[0].key.toUpperCase();
            } else {
                // If it's all 6 sheets
                docType = "TONG_HOP";
            }

            // 4. Construct the final professional filename
            // Example output: TQC_20260616_DNTT_Cong_Ty_TNHH_A.xlsx
            const fname = `TQC_${cleanDate}_${docType}_${cleanKhName}.xlsx`;

            // Trigger download
            XLSX.writeFile(wb, fname);
            showToast('✅ Xuất Excel thành công: ' + fname, 'success');
        }
